<title>ثروتي - نظام إدارة مالية متكامل</title>
<style>
:root{--bg:#0f172a;--panel:#111827;--card:#1e293b;--line:#334155;--text:#f1f5f9;--muted:#94a3b8;--accent:#10b981;--green:#10b981;--red:#ef4444;--blue:#3b82f6;--yellow:#eab308;--purple:#a855f7;--orange:#f97316;--cyan:#06b6d4;--inputbg:#020617;--sidebarbg:#020617}
[data-theme="light"]{--bg:#f1f5f9;--panel:#ffffff;--card:#ffffff;--line:#e2e8f0;--text:#0f172a;--muted:#64748b;--inputbg:#ffffff;--sidebarbg:#ffffff}
[data-theme="light"] .nav-group-title{background:var(--accentBg,#ecfdf5);color:var(--accentText,#047857);border-right:3px solid var(--accent);border-bottom:1px solid var(--line)}
[data-theme="light"] .nav-group-items button:hover,[data-theme="light"] .nav-group-items button.active{color:#fff}
[data-theme="light"] .top{background:#f8fafc}
[data-theme="light"] th{background:#f8fafc}
[data-theme="light"] tr:hover td{background:rgba(16,185,129,.06)}
[data-theme="light"] input,[data-theme="light"] select,[data-theme="light"] textarea{border:1px solid var(--line);color:var(--text)}
[data-theme="light"] .card{box-shadow:0 1px 3px rgba(0,0,0,.06)}
/* ===== لوحات الألوان (ثيمات) — داكنة ===== */
[data-theme="dark"][data-palette="emerald"]{--bg:#0f172a;--panel:#111827;--card:#1e293b;--line:#334155;--inputbg:#020617;--sidebarbg:#020617;--accent:#10b981}
[data-theme="dark"][data-palette="azure"]{--bg:#0c1322;--panel:#0f1c30;--card:#16243d;--line:#274056;--inputbg:#060c18;--sidebarbg:#060c18;--accent:#3b82f6}
[data-theme="dark"][data-palette="violet"]{--bg:#160f24;--panel:#1d1430;--card:#2a1f43;--line:#3f2e63;--inputbg:#0c0816;--sidebarbg:#0c0816;--accent:#a855f7}
[data-theme="dark"][data-palette="amoled"]{--bg:#000000;--panel:#0a0a0a;--card:#141414;--line:#262626;--inputbg:#000000;--sidebarbg:#000000;--accent:#10b981}
/* ===== لوحات الألوان (ثيمات) — فاتحة ===== */
[data-theme="light"][data-palette="emerald"]{--bg:#f1f5f9;--panel:#ffffff;--card:#ffffff;--line:#e2e8f0;--inputbg:#ffffff;--sidebarbg:#ffffff;--accent:#10b981;--accentBg:#ecfdf5;--accentText:#047857}
[data-theme="light"][data-palette="azure"]{--bg:#f0f6fc;--panel:#ffffff;--card:#ffffff;--line:#dbeafe;--inputbg:#ffffff;--sidebarbg:#ffffff;--accent:#2563eb;--accentBg:#eff6ff;--accentText:#1d4ed8}
[data-theme="light"][data-palette="rose"]{--bg:#fff1f4;--panel:#ffffff;--card:#ffffff;--line:#fecdd6;--inputbg:#ffffff;--sidebarbg:#ffffff;--accent:#e11d48;--accentBg:#fff1f2;--accentText:#be123c}
[data-theme="light"][data-palette="sand"]{--bg:#fbf7ef;--panel:#fffdf8;--card:#fffdf8;--line:#e9ddc4;--inputbg:#fffdf8;--sidebarbg:#fffdf8;--accent:#b45309;--accentBg:#fef3e2;--accentText:#92400e}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Tahoma,Arial,sans-serif;background:var(--bg);color:var(--text);font-size:14px}
.app{display:flex;height:100vh;overflow:hidden}

/* === SIDEBAR === */
.sidebar{width:270px;background:var(--sidebarbg);border-left:1px solid var(--line);display:flex;flex-direction:column;overflow-y:auto;flex-shrink:0}
.logo{padding:18px 16px;border-bottom:1px solid var(--line)}
.logo h1{color:var(--accent);font-size:22px;display:flex;align-items:center;gap:8px}
.logo p{color:var(--muted);font-size:11px;margin-top:2px}
.nav-group{border-bottom:1px solid var(--line)}
.nav-group-title{padding:10px 16px;font-size:11px;color:var(--accent);font-weight:700;text-transform:uppercase;letter-spacing:1px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;background:var(--card);border-right:3px solid var(--accent);border-bottom:1px solid var(--line)}
.nav-group-title:hover{color:var(--accent);filter:brightness(1.2)}
.nav-group-items{overflow:hidden;transition:max-height .3s ease}
.nav-group-items.collapsed{max-height:0!important}
.nav-group-items button{width:100%;display:flex;gap:8px;align-items:center;padding:9px 16px 9px 28px;border:0;background:transparent;color:var(--text);cursor:pointer;text-align:right;font-size:13px;transition:.15s}
.nav-group-items button:hover,.nav-group-items button.active{background:var(--accent);color:#fff}

/* === MAIN === */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.top{height:56px;background:var(--sidebarbg);border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;padding:0 20px}
.top .tl{font-size:16px;font-weight:600}
.top .actions{display:flex;gap:8px;align-items:center}
.content{padding:20px;overflow-y:auto;flex:1}

/* === BUTTONS === */
.btn{border:0;border-radius:8px;padding:8px 14px;color:var(--text);background:var(--card);border:1px solid var(--line);cursor:pointer;font-size:13px;transition:.15s;display:inline-flex;align-items:center;gap:5px}
.btn:hover{filter:brightness(1.15)}
.btn.green,.btn.red,.btn.blue,.btn.purple,.btn.orange,.btn.cyan{color:#fff;border:0}
.btn.green{background:var(--accent)}.btn.red{background:var(--red)}.btn.blue{background:var(--blue)}.btn.yellow{background:var(--yellow);color:#000;border:0}.btn.purple{background:var(--purple)}.btn.orange{background:var(--orange)}.btn.cyan{background:var(--cyan)}
.btn.sm{padding:4px 8px;font-size:11px}
.btn.lg{padding:12px 20px;font-size:15px}

/* === GRID & CARDS === */
.grid{display:grid;gap:14px}
.g4{grid-template-columns:repeat(4,1fr)}.g3{grid-template-columns:repeat(3,1fr)}.g2{grid-template-columns:repeat(2,1fr)}
.card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px}
.kpi h3{color:var(--muted);font-size:12px;font-weight:400}
.kpi .v{display:block;margin-top:6px;font-size:22px;font-weight:700}

/* === COLORS === */
.g{color:var(--green)}.r{color:var(--red)}.b{color:var(--blue)}.y{color:var(--yellow)}.p{color:var(--purple)}.o{color:var(--orange)}

/* === TABLE === */
table{width:100%;border-collapse:collapse;font-size:13px}
th,td{border-bottom:1px solid var(--line);padding:9px 10px;text-align:right;vertical-align:middle}
th{color:var(--muted);background:var(--sidebarbg);font-weight:500;font-size:12px}
tr:hover td{background:rgba(16,185,129,.04)}

/* === FORMS === */
input,select,textarea{width:100%;background:var(--inputbg);color:var(--text);border:1px solid var(--line);border-radius:8px;padding:9px 10px;font-size:13px}
input:focus,select:focus,textarea:focus{border-color:var(--accent);outline:none;box-shadow:0 0 0 2px var(--accentSoft,rgba(16,185,129,.15))}
label{font-size:12px;color:var(--muted);display:block;margin-bottom:4px}
.fg{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.fg.c2{grid-template-columns:repeat(2,1fr)}
.fg .full{grid-column:1/-1}
.fld{margin-bottom:0}

/* === MODAL === */
.modal{position:fixed;inset:0;background:rgba(0,0,0,.75);display:none;align-items:center;justify-content:center;z-index:99;padding:16px}
.modal.show{display:flex}
.mbox{background:var(--panel);border:1px solid var(--line);border-radius:16px;width:min(1050px,100%);max-height:92vh;overflow-y:auto;padding:20px}
.mhead{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.mhead h2{font-size:20px}

/* === MISC === */
.split{display:flex;justify-content:space-between;align-items:center;gap:8px}
.badge{display:inline-block;border-radius:99px;padding:3px 9px;font-size:11px;font-weight:500}
.badge.g{background:#064e3b;color:#6ee7b7}.badge.r{background:#7f1d1d;color:#fca5a5}.badge.b{background:#1e3a5f;color:#93c5fd}.badge.y{background:#78350f;color:#fcd34d}
.progress{height:7px;background:var(--inputbg);border-radius:99px;overflow:hidden;margin-top:4px}
.progress span{display:block;height:100%;border-radius:99px}
.small{font-size:12px;color:var(--muted)}
.tag{display:inline-block;background:var(--card);padding:4px 10px;border-radius:99px;margin:3px;font-size:12px;border:1px solid var(--line)}
.shead{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:8px}
.shead h2{font-size:22px}
.tabs{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.tabs .tab{padding:7px 14px;border-radius:8px;cursor:pointer;background:var(--card);border:1px solid var(--line);font-size:13px;transition:.15s}
.tabs .tab:hover,.tabs .tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.empty{text-align:center;padding:40px;color:var(--muted)}
.mono{font-family:monospace;letter-spacing:1px}

.bottom-nav{display:none}
@media(max-width:900px){
.sidebar{position:fixed;top:0;right:0;height:100vh;width:80%;max-width:300px;z-index:200;transform:translateX(100%);transition:transform .25s ease;box-shadow:-6px 0 24px rgba(0,0,0,.35)}
.sidebar.mobile-open{transform:translateX(0)}
.sidebar-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:199;opacity:0;pointer-events:none;transition:opacity .25s}
.sidebar-backdrop.show{opacity:1;pointer-events:auto}
.logo p,.logo h1 span{display:block}
/* القائمة وهي مفتوحة كـ overlay كاملة العرض تستخدم نفس تخطيط الديسكتوب العادي (صف أفقي)، لا التخطيط العمودي المضغوط */
.nav-group-title{flex-direction:row;padding:10px 16px}
.nav-group-title span:first-child{display:block!important;font-size:11px;max-width:none;white-space:nowrap;text-align:right}
.nav-group-items button{flex-direction:row;gap:8px;padding:9px 16px 9px 28px;font-size:13px}
.nav-group-items button span{display:inline!important;white-space:nowrap;font-size:13px}
.g4,.g3,.g2,.fg,.fg.c2{grid-template-columns:1fr}
.top{padding:0 10px}.content{padding:12px;padding-bottom:80px}
.actions .btn.green.lg{display:none} /* الزر العائم في الشريط السفلي يكفي ويغني عن تكراره في الشريط العلوي على الموبايل */
/* الشريط السفلي الثابت */
.bottom-nav{display:flex;position:fixed;bottom:0;left:0;right:0;height:60px;background:var(--sidebarbg);border-top:1px solid var(--line);z-index:150;justify-content:space-around;align-items:center;padding-bottom:env(safe-area-inset-bottom)}
.bottom-nav button{background:transparent;border:0;color:var(--muted);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;font-size:10px;flex:1;height:100%;padding:6px 0;cursor:pointer}
.bottom-nav button span:first-child{font-size:18px;line-height:1}
.bottom-nav button.active{color:var(--accent)}
.bottom-nav-fab{background:var(--accent)!important;color:#fff!important;width:52px;height:52px;border-radius:50%;margin-top:-26px;box-shadow:0 4px 12px rgba(0,0,0,.35);flex:0 0 52px!important}
.bottom-nav-fab span{font-size:24px!important}
}
@media(min-width:901px){.sidebar-backdrop{display:none}}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--line);border-radius:3px}
</style>

function upgradeData(d){if(!d.costCenters)d.costCenters=seed.costCenters;if(!d.contacts)d.contacts=[];if(!d.tags)d.tags=seed.tags;if(!d.settings.nextEntryNo)d.settings.nextEntryNo=1;if(!d.custodies)d.custodies=[];if(!d.settings.theme)d.settings.theme="dark";if(!d.settings.palette)d.settings.palette="emerald";if(d.settings.backupOnClose===undefined)d.settings.backupOnClose=true;if(!d.settings.scheduledBackupTime)d.settings.scheduledBackupTime="";if(!d.settings.gdriveClientId)d.settings.gdriveClientId="";if(d.settings.gdriveAutoBackup===undefined)d.settings.gdriveAutoBackup=false;if(!d.vault)d.vault=[];if(!d.reminders)d.reminders=[];if(!d.trash)d.trash=[];
// ترقية آلية: تحويل العملات القديمة (سعر ثابت واحد) إلى بنية تاريخية (مصفوفة أسعار بتواريخ نفاذ)
(d.currencies||[]).forEach(c=>{if(!c.rates){c.rates=[{date:"2020-01-01",rate:c.rate??1}];delete c.rate}});
// ترقية آلية للتذكيرات القديمة (نظام "النوع" المبسط) إلى صيغة المجموعة/الفئة/الإجراء الجديدة
const legacyKindMap={"سداد مصروفات":"مصروف","تحصيل إيرادات":"إيراد","تحويلات":"تحويل","تسويات أخرى":"تسوية"};
(d.reminders||[]).forEach(r=>{if(!r.group){r.group=legacyKindMap[r.kind]||"مصروف";r.cat=r.cat||"";r.act=r.act||"";r.kind=r.kind&&!legacyKindMap[r.kind]?r.kind:r.group}});
// تصحيح تلقائي لمرة واحدة: التحويلات قديماً كانت تُسجَّل خطأً كمصروف داخل سجل العمليات بالإضافة لوجودها في سجل التحويلات، هذا يحذف تلك القيود المكررة (لا يؤثر على سجل التحويلات نفسه)
if(d.transactions&&d.transactions.some(t=>t.entryType==="تحويل")){d.transactions=d.transactions.filter(t=>t.entryType!=="تحويل")}
// ترقية آلية: إعطاء رقم حساب ونوع لكل حساب حقيقي قديم لا يملكهما
if(!d.settings.nextAccCode)d.settings.nextAccCode=1001;
d.accounts.forEach(a=>{if(!a.accType)a.accType="حساب";if(!a.code)a.code=d.settings.nextAccCode++});

const expMains=[...new Set((d.expCats||[]).map(x=>x.main))];
const incMains=[...new Set((d.incCats||[]).map(x=>x.main))];
expMains.forEach(m=>{if(!d.accounts.some(a=>a.accType==="مصروف"&&a.name===m))d.accounts.push({id:uid(),code:d.settings.nextAccCode++,name:m,group:"فئة مصروف",currency:d.settings.baseCurrency,opening:0,balance:0,networth:"لا",active:"نعم",accType:"مصروف"})});
incMains.forEach(m=>{if(!d.accounts.some(a=>a.accType==="إيراد"&&a.name===m))d.accounts.push({id:uid(),code:d.settings.nextAccCode++,name:m,group:"فئة إيراد",currency:d.settings.baseCurrency,opening:0,balance:0,networth:"لا",active:"نعم",accType:"إيراد"})});
// ترقية آلية: إنشاء حساب تسوية (أصل/مطلوبات) لكل نوع من أنواع "تسوية حسابات أخرى" التسعة — مطابق تماماً لقيمة main المستخدمة فعلياً في القيود، لضمان ظهورها في ميزان المراجعة بنفس منطق فئات المصروف/الإيراد
const settleAccounts=[
{name:"دين عليّ",group:"مطلوبات — ديون عليّ",accType:"مطلوبات"},
{name:"سلف لي عند الناس",group:"أصول — سلف لي عند الناس",accType:"أصول"},

];

function uid(){return Date.now()+Math.floor(Math.random()*999)}

// يرجع سعر الصرف الفعلي لعملة في تاريخ معيّن (أحدث سعر تاريخ نفاذه <= التاريخ المطلوب)؛ لو لم يُمرَّر تاريخ يُستخدم تاريخ اليوم تلقائياً (يحافظ على توافق كل الاستدعاءات القديمة rt(code) كما هي)
function rt(c,date){
const cur=D.currencies.find(x=>x.code===c);
if(!cur)return 1;
const rates=cur.rates||(cur.rate!=null?[{date:"2020-01-01",rate:cur.rate}]:[]);
if(!rates.length)return 1;
const q=date||today();
const sorted=[...rates].sort((a,b)=>a.date.localeCompare(b.date));
let applicable=sorted[0];
for(const r of sorted){if(r.date<=q)applicable=r;else break}
return Number(applicable.rate)||1;
}
function mn(v,c){if(D.settings.privacy)return"*****";c=c||"";return Number(v||0).toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2})+(c?" "+c:"")}
function fmtDate(d){if(!d)return"";const p=String(d).split("-");if(p.length===3)return p[2]+"/"+p[1]+"/"+p[0];return d}
function today(){return new Date().toISOString().slice(0,10)}
function thisMonth(){return new Date().toISOString().slice(0,7)}
function accNames(){return D.accounts.filter(a=>a.active==="نعم"&&a.accType==="حساب").map(a=>a.name)}
function nextAccCode(){const n=D.settings.nextAccCode||1001;D.settings.nextAccCode=n+1;return n}
function curCodes(){return D.currencies.map(c=>c.code)}
function expMains(){return[...new Set(D.expCats.map(c=>c.main))]}
function expSubs(m){return D.expCats.filter(c=>c.main===m).map(c=>c.sub)}
function incMains(){return[...new Set(D.incCats.map(c=>c.main))]}
function incSubs(m){return D.incCats.filter(c=>c.main===m).map(c=>c.sub)}

// تعقيم النصوص قبل حقنها كـ HTML (لمنع كسر الصفحة لو النص يحتوي على " أو < أو & أو ')، يُستخدم عند عرض بيانات قد تحتوي رموزاً خاصة مثل كلمات المرور والملاحظات
function esc(s){return String(s??"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;")}
function nextEntryNo(){const n=D.settings.nextEntryNo||1;D.settings.nextEntryNo=n+1;return n}
// تصنيف موحّد لنوع الحركة: إيراد=أخضر(+) / مصروف=أحمر(−) / غير ذلك (افتتاحي..)=أزرق محايد
function txSign(type){return type==="إيراد"?1:type==="مصروف"?-1:0}
function txClass(type){const s=txSign(type);return s>0?"g":s<0?"r":"b"}
function txPrefix(type){const s=txSign(type);return s>0?"+":s<0?"-":""}
// يحسب حركة حساب حقيقي (kind="account") أو فئة مصروف/إيراد وهمية (kind="exp"/"inc") ضمن مدى تاريخ معيّن
// المهم: الرصيد الافتتاحي هنا محسوب "حتى تاريخ from" (يشمل كل ما قبلها)، لا الرصيد الأصلي للحساب فقط — هذا يصحح خطأ كان موجوداً في حساب الختامي عند تغيير "من تاريخ"
function accMovement(kind,label,from,to){
let baseOpening=0,moves=[];
if(kind==="account"){
const acc=D.accounts.find(a=>a.name===label);if(!acc)return null;
baseOpening=Number(acc.opening||0);
D.transactions.forEach(t=>{if(t.account!==label||t.type==="افتتاحي")return;
moves.push({date:t.date,desc:`${t.entryType||t.type}: ${t.main||""}${t.sub?" > "+t.sub:""}`,debit:t.type==="إيراد"?Number(t.amount):0,credit:t.type==="مصروف"?Number(t.amount):0,cur:t.currency||acc.currency})});
D.transfers.forEach(t=>{
if(t.from===label)moves.push({date:t.date,desc:`تحويل صادر → ${t.to}`,debit:0,credit:Number(t.outAmount)+Number(t.fee||0),cur:t.outCurrency});
if(t.to===label)moves.push({date:t.date,desc:`تحويل وارد ← ${t.from}`,debit:Number(t.inAmount),credit:0,cur:t.inCurrency});
});
}else{
// فئات المصروف/الإيراد الوهمية: حركة واحدة الاتجاه (exp=مدين دائماً، inc=دائن دائماً)
// فئات التسوية الوهمية (دين/سلفة/أصل...): قد تحتوي حركات من النوعين معاً بنفس الاسم (مثل إنشاء دين=إيراد وسداده=مصروف) فتُحسب كل حركة حسب نوعها الفعلي لا افتراض ثابت
const isSettleKind=kind==="exp"||kind==="inc";
D.transactions.forEach(t=>{if((t.main||"")!==label)return;
if(isSettleKind&&t.type!==(kind==="exp"?"مصروف":"إيراد")&&!["مصروف","إيراد"].includes(t.type))return;
moves.push({date:t.date,desc:`${t.account} — ${t.sub||""}`,debit:t.type==="مصروف"?Number(t.amount):0,credit:t.type==="إيراد"?Number(t.amount):0,cur:t.currency});
});
}
const cur2=moves[0]?.cur||D.settings.baseCurrency;
const before=moves.filter(m=>m.date<from);
const within=moves.filter(m=>m.date>=from&&m.date<=to).sort((a,b)=>a.date.localeCompare(b.date));
const openingAtFrom=baseOpening+before.reduce((s,m)=>s+m.debit-m.credit,0);
const debit=within.reduce((s,m)=>s+m.debit,0),credit=within.reduce((s,m)=>s+m.credit,0);
const closing=openingAtFrom+debit-credit;
return{opening:openingAtFrom,debit,credit,closing,moves:within,currency:cur2};
}

// 1) اتجاه آخر 6 شهور: دخل/مصروف
function last6MonthsTrend(){
const months=[];
const d=new Date();
for(let i=5;i>=0;i--){const dd=new Date(d.getFullYear(),d.getMonth()-i,1);months.push(dd.toISOString().slice(0,7))}
return months.map(ym=>{
const inc=D.transactions.filter(x=>x.type==="إيراد"&&(x.date||"").startsWith(ym)).reduce((s,x)=>s+Number(x.baseValue||0),0);
const exp=D.transactions.filter(x=>x.type==="مصروف"&&(x.date||"").startsWith(ym)).reduce((s,x)=>s+Number(x.baseValue||0),0);
return{ym,inc,exp};
});
}
function trendChartSVG(){
const data=last6MonthsTrend();
const maxV=Math.max(1,...data.map(d=>Math.max(d.inc,d.exp)));
const w=560,h=180,bw=36,gap=(w-40)/data.length;
const bars=data.map((d,i)=>{
const x=20+i*gap;
const hInc=Math.round(d.inc/maxV*130),hExp=Math.round(d.exp/maxV*130);
const label=new Date(d.ym+"-01").toLocaleDateString("ar-EG",{month:"short"});
return`<rect x="${x}" y="${150-hInc}" width="${bw/2-2}" height="${hInc}" fill="var(--green)" rx="2"/>
<rect x="${x+bw/2}" y="${150-hExp}" width="${bw/2-2}" height="${hExp}" fill="var(--red)" rx="2"/>
<text x="${x+bw/2-2}" y="168" font-size="10" fill="var(--muted)" text-anchor="middle">${label}</text>`;
}).join("");
return`<svg viewBox="0 0 ${w} ${h}" style="width:100%;height:160px">${bars}</svg>`;
}

function saveEntry(e){
e.preventDefault();
const fd=Object.fromEntries(new FormData(e.target).entries());
const t=resolveEntryType();
const eNo=nextEntryNo();
const amt=Number(fd.amount||0);
const cur2=fd.currency||D.settings.baseCurrency;
const r=Number(fd.rateOverride)>0?Number(fd.rateOverride):rt(cur2,fd.date);
const bv=amt*r;
const tx={id:uid(),entryNo:eNo,type:["إيراد","بيع أصل","تحصيل سلفة"].some(x=>t.includes(x))?"إيراد":"مصروف",
entryType:t,date:fd.date||today(),account:fd.account||fd.fromAcc||"",
main:fd.main||t,sub:fd.sub||"",amount:amt,currency:cur2,rate:r,baseValue:bv,
merchant:fd.merchant||fd.person||"",costCenter:fd.costCenter||"",tag:fd.tag||"",
contact:fd.contact||"",notes:fd.notes||""};

if(t==="تحويل"){
const tr={id:uid(),entryNo:eNo,date:fd.date,from:fd.fromAcc,to:fd.toAcc,outAmount:Number(fd.outAmount),outCurrency:fd.outCurrency,inAmount:Number(fd.inAmount),inCurrency:fd.inCurrency,rate:Number(fd.rate||1),fee:Number(fd.fee||0),notes:fd.notes||""};
D.transfers.unshift(tr);
const fa=D.accounts.find(a=>a.name===fd.fromAcc);const ta=D.accounts.find(a=>a.name===fd.toAcc);
if(fa)fa.balance=Number(fa.balance)-Number(fd.outAmount)-Number(fd.fee||0);
if(ta)ta.balance=Number(ta.balance)+Number(fd.inAmount);
// ملحوظة: التحويل بين الحسابات ليس مصروفاً ولا إيراداً حقيقياً، فلا يُسجَّل في سجل العمليات تجنباً لتضخيم تقارير المصروفات/الإيرادات؛ سجل التحويلات (D.transfers) هو المرجع الكامل له، وتظهر حركتاه (من/إلى) في شاشة "القيود" الموحّدة
}else if(t==="مصروف"){
D.transactions.unshift(tx);
const a=D.accounts.find(x=>x.name===fd.account);if(a)a.balance=Number(a.balance)-amt;
}else if(t==="إيراد"){
tx.type="إيراد";D.transactions.unshift(tx);
const a=D.accounts.find(x=>x.name===fd.account);if(a)a.balance=Number(a.balance)+amt;
}else if(t==="شراء أصل"){
D.transactions.unshift(tx);
const a=D.accounts.find(x=>x.name===fd.account);if(a)a.balance=Number(a.balance)-amt;

}else if(t==="بيع أصل"){
tx.type="إيراد";tx.main="بيع أصل";tx.sub=fd.assetName;D.transactions.unshift(tx);
const a=D.accounts.find(x=>x.name===fd.account);if(a)a.balance=Number(a.balance)+amt;
const ast=D.assets.find(x=>x.name===fd.assetName);if(ast){ast.status="مباع";ast.soldDate=fd.date;ast.soldPrice=amt}
}else if(t==="دين عليّ"){
tx.type="إيراد";tx.main="دين عليّ";tx.sub=fd.person;D.transactions.unshift(tx);
const a=D.accounts.find(x=>x.name===fd.account);if(a)a.balance=Number(a.balance)+amt;
D.debts.unshift({id:uid(),person:fd.person,amount:amt,currency:cur2,date:fd.date,due:fd.due||"",paid:0,status:"مفتوح",account:fd.account,contact:fd.contact||""});
}else if(t==="سداد دين"){
tx.main="دين عليّ";tx.sub="سداد";D.transactions.unshift(tx);
const a=D.accounts.find(x=>x.name===fd.account);if(a)a.balance=Number(a.balance)-amt;
const debt=D.debts.find(x=>x.id==fd.debtId);if(debt){debt.paid=Number(debt.paid||0)+amt;debt.status=debt.paid>=debt.amount?"مغلق":"مدفوع جزئياً";}
}else if(t==="سلفة لشخص"){
tx.main="سلف لي عند الناس";D.transactions.unshift(tx);
const a=D.accounts.find(x=>x.name===fd.account);if(a)a.balance=Number(a.balance)-amt;
D.loans.unshift({id:uid(),person:fd.person,phone:fd.phone||"",amount:amt,currency:cur2,date:fd.date,expected:fd.expected||"",paid:0,status:"مفتوح",account:fd.account,contact:fd.contact||""});
}else if(t==="تحصيل سلفة"){
tx.type="إيراد";tx.main="سلف لي عند الناس";tx.sub="تحصيل";D.transactions.unshift(tx);
const a=D.accounts.find(x=>x.name===fd.account);if(a)a.balance=Number(a.balance)+amt;
const loan=D.loans.find(x=>x.id==fd.loanId);if(loan){loan.paid=Number(loan.paid||0)+amt;loan.status=loan.paid>=loan.amount?"مغلق":"مدفوع جزئياً";}
}else if(t==="استثمار"){
D.transactions.unshift(tx);
const a=D.accounts.find(x=>x.name===fd.account);if(a)a.balance=Number(a.balance)-amt;
D.investments.unshift({id:uid(),name:fd.invName,type:fd.invType||"",date:fd.date,capital:amt,currency:cur2,currentValue:Number(fd.currentValue||amt),maturity:fd.maturity||"",account:fd.account});
}else if(t==="شراء ذهب"){
const total=Number(fd.grams)*Number(fd.buyGram);tx.amount=total;tx.baseValue=total*r;
D.transactions.unshift(tx);
const a=D.accounts.find(x=>x.name===fd.account);if(a)a.balance=Number(a.balance)-total;
D.gold.unshift({id:uid(),karat:fd.karat,grams:Number(fd.grams),buyGram:Number(fd.buyGram),totalBuy:total,marketGram:Number(fd.marketGram||fd.buyGram),profit:Number(fd.grams)*(Number(fd.marketGram||fd.buyGram)-Number(fd.buyGram)),place:fd.place||"",account:fd.account,currency:cur2});
}else if(t==="شراء عقار"){
D.transactions.unshift(tx);
const a=D.accounts.find(x=>x.name===fd.account);if(a)a.balance=Number(a.balance)-amt;
D.properties.unshift({id:uid(),name:fd.propName,location:fd.location||"",purchasePrice:amt,currentValue:Number(fd.currentValue||amt),currency:cur2,rent:Number(fd.rent||0),account:fd.account});
}else if(t==="ادخار"){
D.transactions.unshift(tx);
const a=D.accounts.find(x=>x.name===fd.account);if(a)a.balance=Number(a.balance)-amt;
if(fd.savingId==="new"){D.savings.unshift({id:uid(),name:fd.savingName||"هدف جديد",target:Number(fd.savingTarget||amt),current:amt,account:fd.account,targetDate:"",monthly:0,status:"نشط"});}
else{const sv=D.savings.find(x=>x.id==fd.savingId);if(sv){sv.current=Number(sv.current||0)+amt;if(sv.current>=sv.target)sv.status="مكتمل";}}
}else if(t==="قسط"){
D.transactions.unshift(tx);
const a=D.accounts.find(x=>x.name===fd.account);if(a)a.balance=Number(a.balance)-amt;
const inst=D.installments.find(x=>x.id==fd.instId);if(inst){inst.paidCount=(inst.paidCount||0)+1;inst.remaining=Number(inst.remaining??(Number(inst.total)-Number(inst.down||0)))-amt;if(inst.remaining<=0||inst.paidCount>=inst.count){inst.remaining=Math.max(0,inst.remaining);inst.status="مكتمل"}}
}else if(t==="عهدة جديدة"){
const cAmt=Number(fd.amount||0);
D.custodies.unshift({id:uid(),entryNo:eNo,name:fd.custName,person:fd.person,direction:fd.direction,date:fd.date,amount:cAmt,currency:cur2,account:fd.account||"",expected:fd.expected||"",status:"قيد العهدة",notes:fd.notes||""});
if(cAmt>0&&fd.account){const a=D.accounts.find(x=>x.name===fd.account);if(a)a.balance=Number(a.balance)+(fd.direction==="تسليم"?-cAmt:cAmt)}
audit("عهدة جديدة: "+fd.custName+" — "+fd.person);completeLinkedReminder();save();closeModal();go(cur);return;
}else if(t==="استرجاع عهدة"){
const cst=D.custodies.find(x=>x.id==fd.custId);
if(cst){cst.status="مرتجعة";cst.returnDate=fd.date;
if(Number(cst.amount)>0&&cst.account){const a=D.accounts.find(x=>x.name===cst.account);if(a)a.balance=Number(a.balance)+(cst.direction==="تسليم"?Number(cst.amount):-Number(cst.amount))}}
audit("استرجاع عهدة: "+(cst?cst.name:""));completeLinkedReminder();save();closeModal();go(cur);return;
}
audit("قيد: "+t+" — "+mn(tx.amount,tx.currency)+" — "+tx.account);
completeLinkedReminder();save();closeModal();go(cur);
}

const ym=today().slice(0,7);
const fromTransfers=D.transfers.filter(t=>t.to===accName&&(t.date||"").startsWith(ym)).reduce((s,t)=>s+Number(t.inAmount||0),0);

return fromTransfers+fromIncome;
}

const fd=Object.fromEntries(new FormData(e.target).entries());
const codeNum=fd.code?Number(fd.code):null;
if(codeNum&&D.accounts.some(x=>x.code===codeNum&&x.id!==Number(fd._id))){alert("رقم الحساب "+codeNum+" مستخدم بالفعل لحساب آخر، اختر رقماً مختلفاً");return}
if(fd._id){
const a=D.accounts.find(x=>x.id===Number(fd._id));
if(a){a.code=codeNum||a.code;if(!["مصروف","إيراد","أصول","مطلوبات"].includes(fd._accType)){a.name=fd.name;a.group=fd.group;a.currency=fd.currency;a.opening=Number(fd.opening);a.balance=Number(fd.balance);a.networth=fd.networth;a.creditLimit=fd.group==="كروت ائتمان"?Number(fd.creditLimit||0):undefined;a.cardExpiry=fd.group==="كروت ائتمان"?(fd.cardExpiry||""):undefined;}a.active=fd.active;audit("تعديل حساب: "+a.name)}
}else{
D.accounts.push({id:uid(),code:codeNum||nextAccCode(),name:fd.name,group:fd.group,currency:fd.currency,opening:Number(fd.opening),balance:Number(fd.balance||fd.opening),networth:fd.networth,active:fd.active,accType:"حساب",creditLimit:fd.group==="كروت ائتمان"?Number(fd.creditLimit||fd.opening||0):undefined,cardExpiry:fd.group==="كروت ائتمان"?(fd.cardExpiry||""):undefined});
audit("إضافة حساب: "+fd.name);
}
save();closeModal();go("accounts");
};
$("modal").classList.add("show");
}
function editAcc(id){openAccForm(D.accounts.find(x=>x.id===id))}
function toggleCreditFields(group){
const show=group==="كروت ائتمان";
const w1=$("creditLimitWrap"),w2=$("cardExpiryWrap");
if(w1)w1.style.display=show?"":"none";
if(w2)w2.style.display=show?"":"none";
}
function delAcc(id){const a=D.accounts.find(x=>x.id===id);if(!a)return;
if(a.accType==="مصروف"||a.accType==="إيراد"){alert("لا يمكن حذف حساب الفئة من هنا — احذف الفئة نفسها من شاشة فئات المصروفات/الإيرادات");return}
const usageTx=D.transactions.filter(t=>t.account===a.name);
const usageTr=D.transfers.filter(t=>t.from===a.name||t.to===a.name);
const usageCount=usageTx.length+usageTr.length;
const alternatives=D.accounts.filter(x=>x.id!==id&&x.accType==="حساب").map(x=>({value:x.name,label:`${x.name} (${x.currency})`}));
requireReplacementThenDelete(usageCount,a.name,alternatives,(replacement)=>{
if(replacement){
usageTx.forEach(t=>t.account=replacement);
usageTr.forEach(t=>{if(t.from===a.name)t.from=replacement;if(t.to===a.name)t.to=replacement;});
const rep=D.accounts.find(x=>x.name===replacement);
if(rep&&Number(a.balance)){rep.balance=Number(rep.balance)+Number(a.balance)*(a.currency===rep.currency?1:rt(a.currency)/rt(rep.currency));}
audit(`نقل ${usageCount} قيد ورصيد الحساب "${a.name}" إلى "${replacement}"`);
}
D.accounts=D.accounts.filter(x=>x.id!==id);audit("حذف حساب: "+a.name);save();go("accounts");
});
}

function rTrialBalance(){
const from=$("tbFrom")?.value||new Date().getFullYear()+"-01-01",to=$("tbTo")?.value||today();
const accRows=accNames().map(a=>({kind:"account",label:a,code:D.accounts.find(x=>x.name===a)?.code,...accMovement("account",a,from,to)}));
const expRows=D.accounts.filter(a=>a.accType==="مصروف").map(a=>({kind:"exp",label:a.name,code:a.code,...accMovement("exp",a.name,from,to)}));
const incRows=D.accounts.filter(a=>a.accType==="إيراد").map(a=>({kind:"inc",label:a.name,code:a.code,...accMovement("inc",a.name,from,to)}));
const assetRows=D.accounts.filter(a=>a.accType==="أصول").map(a=>({kind:"asset",label:a.name,code:a.code,...accMovement("inc",a.name,from,to)}));
const liabRows=D.accounts.filter(a=>a.accType==="مطلوبات").map(a=>({kind:"liab",label:a.name,code:a.code,...accMovement("inc",a.name,from,to)}));
const all=[...accRows,...expRows,...incRows,...assetRows,...liabRows];
const totD=all.reduce((s,r)=>s+Number(r.debit||0),0),totC=all.reduce((s,r)=>s+Number(r.credit||0),0);
const balanced=Math.abs(totD-totC)<0.01;
const kindLabel={account:"حساب",exp:"فئة مصروف",inc:"فئة إيراد",asset:"تسوية - أصل",liab:"تسوية - مطلوبات"};
const kindBadge={account:"b",exp:"r",inc:"g",asset:"y",liab:"o"};
const sectionRows=(rows,title)=>rows.length?`<tr><td colspan="8" style="background:var(--sidebarbg);font-weight:700">${title}</td></tr>${rows.map(r=>`<tr><td><b>${r.code||"-"}</b></td><td><span class="badge ${kindBadge[r.kind]}">${kindLabel[r.kind]}</span></td><td><b>${r.label}</b></td><td>${mn(r.opening,r.currency)}</td><td class="g">${r.debit?mn(r.debit,r.currency):"-"}</td><td class="r">${r.credit?mn(r.credit,r.currency):"-"}</td><td class="${r.closing>=0?'g':'r'}"><b>${mn(r.closing,r.currency)}</b></td><td><button class="btn blue sm" onclick="go('ledger','${r.kind}','${r.label.replace(/'/g,"\\'")}','${from}','${to}')">📒 عرض الحركات</button></td></tr>`).join("")}`:"";
$("content").innerHTML=`
<div class="shead"><h2>📒 ميزان المراجعة الشامل</h2><div>
<button class="btn blue" onclick="exportTrialBalanceCSV()">⬇️ تصدير CSV</button>
<button class="btn" onclick="go('ledger')">كشف حساب مفرد</button>
</div></div>
<div class="card"><div class="fg">
<div><label>من تاريخ</label><input id="tbFrom" type="date" value="${from}" onchange="rTrialBalance()"></div>
<div><label>إلى تاريخ</label><input id="tbTo" type="date" value="${to}" onchange="rTrialBalance()"></div>
</div></div>
<div class="small" style="margin:10px 0">إجمالي مدين: <b class="g">${mn(totD)}</b> — إجمالي دائن: <b class="r">${mn(totC)}</b> — ${balanced?'<span class="badge g">الميزان متوازن ✅</span>':'<span class="badge r">⚠️ غير متوازن (فرق '+mn(Math.abs(totD-totC))+')</span>'}</div>
<table><thead><tr><th>رقم الحساب</th><th>النوع</th><th>الاسم</th><th>افتتاحي</th><th>مدين</th><th>دائن</th><th>ختامي</th><th></th></tr></thead><tbody>
${sectionRows(accRows,"💳 الحسابات الحقيقية")}
${sectionRows(assetRows,"📦 حسابات الأصول (تسوية حسابات أخرى)")}
${sectionRows(liabRows,"📑 حسابات المطلوبات (تسوية حسابات أخرى)")}
${sectionRows(expRows,"🧾 فئات المصروفات (حسابات وهمية)")}
${sectionRows(incRows,"💰 فئات الإيرادات (حسابات وهمية)")}
</tbody></table>
<p class="small" style="margin-top:10px">ملاحظة: فئات المصروفات/الإيرادات وحسابات التسوية (ديون، سلف، أصول، أقساط...) تظهر هنا كحسابات وهمية بنظام قيد مزدوج — كل حركة تُسجَّل مدين على جانب ودائن على الآخر، لذلك إجمالي المدين = إجمالي الدائن دائماً عند توازن النظام.</p>`;
}
function exportTrialBalanceCSV(){
const from=$("tbFrom")?.value||new Date().getFullYear()+"-01-01",to=$("tbTo")?.value||today();
const accRows=accNames().map(a=>({code:D.accounts.find(x=>x.name===a)?.code,kind:"حساب",label:a,...accMovement("account",a,from,to)}));
const expRows=D.accounts.filter(a=>a.accType==="مصروف").map(a=>({code:a.code,kind:"فئة مصروف",label:a.name,...accMovement("exp",a.name,from,to)}));
const incRows=D.accounts.filter(a=>a.accType==="إيراد").map(a=>({code:a.code,kind:"فئة إيراد",label:a.name,...accMovement("inc",a.name,from,to)}));
const rows=[...accRows,...expRows,...incRows];
if(!rows.length)return alert("لا بيانات");
const keys=["code","kind","label","opening","debit","credit","closing","currency"];
const labels={code:"رقم الحساب",kind:"النوع",label:"الاسم",opening:"افتتاحي",debit:"مدين",credit:"دائن",closing:"ختامي",currency:"العملة"};
const csv="\uFEFF"+[keys.map(k=>labels[k]).join(",")].concat(rows.map(r=>keys.map(k=>`"${String(r[k]??"").replace(/"/g,'""')}"`).join(","))).join("\n");
dl(csv,"ميزان_المراجعة.csv","text/csv;charset=utf-8");
}

${subs.map(s=>`<div class="split" style="padding:5px 0;border-bottom:1px solid var(--line)"><span class="tag">${s.sub}</span><button class="btn red sm" onclick="delCat('${mod}',${s.id})">×</button></div>`).join("")}
<div style="margin-top:8px;display:flex;gap:4px"><input id="ns-${m.replace(/\s/g,'_')}" placeholder="فئة فرعية جديدة" style="flex:1"><button class="btn green sm" onclick="addSubCat('${mod}','${m}')">+</button></div>
</div>`}).join("")}</div>`;

function addMainCat(mod){const n=prompt("اسم الفئة الرئيسية الجديدة:");if(!n)return;
D[mod].push({id:uid(),main:n,sub:"عام"});
const accType=mod==="expCats"?"مصروف":"إيراد";
if(!D.accounts.some(a=>a.accType===accType&&a.name===n)){D.accounts.push({id:uid(),code:nextAccCode(),name:n,group:accType==="مصروف"?"فئة مصروف":"فئة إيراد",currency:D.settings.baseCurrency,opening:0,balance:0,networth:"لا",active:"نعم",accType});audit("إضافة حساب فئة: "+n+" ("+accType+")")}
save();go(cur)}
function delMainCat(mod,main){
const accType=mod==="expCats"?"مصروف":"إيراد";
const usage=D.transactions.filter(t=>t.type===accType&&(t.main||"")===main);
const alternatives=D.accounts.filter(a=>a.accType===accType&&a.name!==main).map(a=>({value:a.name,label:a.name}));
requireReplacementThenDelete(usage.length,main,alternatives,(replacement)=>{
if(replacement){
usage.forEach(t=>t.main=replacement);
audit(`نقل ${usage.length} قيد من فئة "${main}" إلى "${replacement}"`);
}
D[mod]=D[mod].filter(x=>x.main!==main);
D.accounts=D.accounts.filter(a=>!(a.accType===accType&&a.name===main));
audit("حذف فئة رئيسية: "+main);save();go(cur);
});
}
function addSubCat(mod,main){const el=$("ns-"+main.replace(/\s/g,'_'));const v=el?.value?.trim();if(!v)return;D[mod].push({id:uid(),main,sub:v});save();go(cur)}
function delCat(mod,id){if(!confirm("حذف هذه الفئة الفرعية؟"))return;D[mod]=D[mod].filter(x=>x.id!==id);save();go(cur)}

function openCurrencyForm(code){
const c=code?D.currencies.find(x=>x.code===code):null;
$("mTitle").innerText=c?"تعديل عملة":"عملة جديدة";
$("mForm").innerHTML=`
<div class="fg">

</div>
<div style="margin-top:14px"><button class="btn green lg" type="submit" style="width:100%">💾 حفظ</button></div>`;
$("mForm").onsubmit=function(e){
e.preventDefault();
const fd=Object.fromEntries(new FormData(e.target).entries());
if(c){c.name=fd.name;audit("تعديل عملة: "+c.code)}
else{
const code=fd.code.toUpperCase().trim();
if(D.currencies.some(x=>x.code===code)){alert("هذا الكود مستخدم بالفعل");return}
D.currencies.push({id:uid(),code,name:fd.name,rates:[{date:today(),rate:Number(fd.rate||1)}]});

function addCurrencyRate(code){
const date=$("newRateDate-"+code)?.value;const val=Number($("newRateVal-"+code)?.value);
if(!date||!val||val<=0){alert("أدخل تاريخ نفاذ وسعراً صحيحاً");return}
const c=D.currencies.find(x=>x.code===code);if(!c)return;
if(!c.rates)c.rates=[];
const existing=c.rates.find(r=>r.date===date);
if(existing)existing.rate=val;else c.rates.push({date,rate:val});
audit(`تحديث سعر ${code}: ${val} من تاريخ ${date}`);
save();go("currencies");
}
function editCurrencyRate(code,date){
const c=D.currencies.find(x=>x.code===code);if(!c)return;
const r=c.rates.find(x=>x.date===date);if(!r)return;
const val=prompt(`السعر الجديد لـ ${code} بتاريخ ${date}:`,r.rate);
if(val===null)return;
const num=Number(val);
if(!num||num<=0){alert("سعر غير صحيح");return}
r.rate=num;audit(`تعديل سعر ${code} بتاريخ ${date} إلى ${num}`);save();go("currencies");
}
function delCurrencyRate(code,date){
const c=D.currencies.find(x=>x.code===code);if(!c||!c.rates||c.rates.length<=1)return;
confirmDangerous(`حذف سعر ${code} الساري من تاريخ ${fmtDate(date)}؟`,()=>{
c.rates=c.rates.filter(r=>r.date!==date);
save();go("currencies");
});
}
function delCurrency(code){
if(D.accounts.some(a=>a.currency===code)){alert("لا يمكن حذف هذه العملة لأنها مستخدمة في حساب واحد أو أكثر");return}
confirmDangerous(`حذف عملة ${code} نهائياً؟`,()=>{D.currencies=D.currencies.filter(x=>x.code!==code);save();go("currencies")});
}

// ============ JOURNAL (شاشة القيود الموحّدة) ============
// يبني سجل القيود الكامل بنظام قيد مزدوج: كل قيد عادي (مصروف/إيراد/تسوية) يظهر على سطرين (الحساب الحقيقي + حساب الفئة الوهمي بالعكس)، التحويلات سطرين (من/إلى)، الافتتاحي والعهد سطر واحد (لا حساب فئة مقابل لهما)
function buildJournal(){
const rows=[];
function accCode(name){return D.accounts.find(a=>a.name===name)?.code||""}
D.transactions.forEach(t=>{
const extra={costCenter:t.costCenter||"",contact:t.contact||"",merchant:t.merchant||""};
if(t.type==="افتتاحي"){
const signed=t.signedAmount??0;
rows.push({entryNo:t.entryNo||"",date:t.date,kind:t.entryType||t.type,leg:"الحساب",account:t.account,accCode:accCode(t.account),
debit:signed>0?signed:0,credit:signed<0?-signed:0,currency:t.currency,desc:[t.main,t.sub].filter(Boolean).join(" / "),notes:t.notes||"",...extra,_src:"tx",_id:t.id});
return;
}
const signed=t.type==="إيراد"?Number(t.amount||0):t.type==="مصروف"?-Number(t.amount||0):0;
const catName=t.main||"أخرى";
// السطر الأول: الحساب الحقيقي
rows.push({entryNo:t.entryNo||"",date:t.date,kind:t.entryType||t.type,leg:"الحساب",account:t.account,accCode:accCode(t.account),
debit:signed>0?signed:0,credit:signed<0?-signed:0,currency:t.currency,desc:[t.main,t.sub].filter(Boolean).join(" / "),notes:t.notes||"",...extra,_src:"tx",_id:t.id});
// السطر الثاني: حساب الفئة الوهمي (بالعكس تماماً لضمان توازن مدين/دائن)
rows.push({entryNo:t.entryNo||"",date:t.date,kind:t.entryType||t.type,leg:"الفئة",account:catName,accCode:accCode(catName),
debit:signed<0?-signed:0,credit:signed>0?signed:0,currency:t.currency,desc:t.account+(t.sub?" / "+t.sub:""),notes:t.notes||"",...extra,_src:"tx",_id:t.id});
});
D.transfers.forEach(t=>{
rows.push({entryNo:t.entryNo||"",date:t.date,kind:"تحويل",leg:"الحساب",account:t.from,accCode:accCode(t.from),debit:0,credit:Number(t.outAmount||0)+Number(t.fee||0),currency:t.outCurrency,desc:"تحويل إلى "+t.to,notes:t.notes||"",costCenter:"",contact:"",merchant:"",_src:"tr",_id:t.id});
rows.push({entryNo:t.entryNo||"",date:t.date,kind:"تحويل",leg:"الحساب",account:t.to,accCode:accCode(t.to),debit:Number(t.inAmount||0),credit:0,currency:t.inCurrency,desc:"تحويل من "+t.from,notes:t.notes||"",costCenter:"",contact:"",merchant:"",_src:"tr",_id:t.id});
});
D.custodies.forEach(c=>{
if(!(Number(c.amount)>0&&c.account))return;
const signed=c.direction==="تسليم"?-Number(c.amount):Number(c.amount);
rows.push({entryNo:c.entryNo||"",date:c.date,kind:"عهدة جديدة",leg:"الحساب",account:c.account,accCode:accCode(c.account),debit:signed>0?signed:0,credit:signed<0?-signed:0,currency:c.currency,desc:c.name+" — "+c.person,notes:c.notes||"",costCenter:"",contact:c.person||"",merchant:"",_src:"cu",_id:c.id});
});
rows.sort((a,b)=>(b.date||"").localeCompare(a.date||"")||(Number(b.entryNo)||0)-(Number(a.entryNo)||0));
return rows;
}

// يجيب السجل الأصلي لسطر القيد حسب مصدره (عملية/تحويل/عهدة)
function getJournalSourceRecord(src,id){
if(src==="tx")return D.transactions.find(x=>x.id===id);
if(src==="tr")return D.transfers.find(x=>x.id===id);
if(src==="cu")return D.custodies.find(x=>x.id===id);
return null;
}
function delJournalEntry(src,id){
if(src==="tx")return delTx(id);
if(src==="tr")return delTr(id);
if(src==="cu"){
const c=D.custodies.find(x=>x.id===id);if(!c)return;
confirmDangerous(`نقل عهدة "${c.name}" لسلة المحذوفات؟ سيتم عكس أثرها على الرصيد إن وجد.`,()=>{
trashItem("custodies",c,"عهدة: "+c.name+" — "+c.person,()=>{
if(Number(c.amount)>0&&c.account){const a=D.accounts.find(x=>x.name===c.account);if(a)a.balance=Number(a.balance)+(c.direction==="تسليم"?Number(c.amount):-Number(c.amount))}
});
D.custodies=D.custodies.filter(x=>x.id!==id);audit("حذف عهدة (نُقلت للسلة): "+c.name);save();go("journal");
});
}
}

function parseCSVText(text){
const lines=text.replace(/^\uFEFF/,"").split(/\r?\n/).filter(l=>l.length);
const split=l=>{const out=[];let cur="",inQ=false;for(let i=0;i<l.length;i++){const ch=l[i];if(ch==='"'){if(inQ&&l[i+1]==='"'){cur+='"';i++}else inQ=!inQ}else if(ch===","&&!inQ){out.push(cur);cur=""}else cur+=ch}out.push(cur);return out};
const headers=split(lines[0]).map(h=>h.trim());
return lines.slice(1).map(l=>{const vals=split(l);const o={};headers.forEach((h,i)=>o[h]=(vals[i]??"").trim());return o});
}
function normImportDate(v){
if(v==null||v==="")return today();
if(typeof v==="number"){const d=new Date(Math.round((v-25569)*86400*1000));return d.toISOString().slice(0,10)}
const s=String(v).trim();
if(/^\d{4}-\d{2}-\d{2}/.test(s))return s.slice(0,10);
const m=s.match(/^(\d{1,2})[\/-](\d{1,2})[\/-](\d{4})$/);
if(m)return`${m[3]}-${String(m[2]).padStart(2,"0")}-${String(m[1]).padStart(2,"0")}`;
return today();
}
function runImportJournal(){
const file=$("importFile").files[0];
if(!file){alert("اختر ملفاً أولاً");return}
const isXlsx=/\.xlsx?$/i.test(file.name);
const reader=new FileReader();
reader.onload=function(ev){
let rows=[];
try{
if(isXlsx){
if(typeof XLSX==="undefined"){alert("تعذّر تحميل مكتبة Excel. حوّل الملف إلى CSV وأعد المحاولة.");return}
const wb=XLSX.read(ev.target.result,{type:"array"});
const sh=wb.Sheets[wb.SheetNames[0]];
rows=XLSX.utils.sheet_to_json(sh,{raw:true});
}else{
rows=parseCSVText(ev.target.result);
}
}catch(err){alert("تعذّر قراءة الملف: "+err.message);return}
if(!rows.length){alert("الملف لا يحتوي على بيانات");return}
let created=0,newAccounts=0,opened=0;
const noMap=new Map(); // يربط رقم القيد في الملف (للتجميع فقط) برقم تسلسلي جديد فريد من النظام، لمنع أي تعارض مع أرقام مستخدمة بالفعل
rows.forEach(row=>{
const rawNo=String(row["رقم القيد"]??"").trim();
let entryNo;
if(rawNo){if(!noMap.has(rawNo))noMap.set(rawNo,nextEntryNo());entryNo=noMap.get(rawNo);}
else entryNo=nextEntryNo();
const date=normImportDate(row["تاريخ القيد"]);
const accName=String(row["الحساب"]||"").trim();if(!accName)return;
const debit=Number(row["مدين"]||0)||0,credit=Number(row["دائن"]||0)||0;
const kind=String(row["نوع الحركة"]||"").trim()||"مستورد";
const notes=String(row["ملاحظات"]||"").trim();
let acc=D.accounts.find(a=>a.name===accName&&a.accType==="حساب");
if(!acc){acc={id:uid(),code:nextAccCode(),name:accName,group:"مستورد",currency:D.settings.baseCurrency,opening:0,balance:0,networth:"نعم",active:"نعم",accType:"حساب"};D.accounts.push(acc);newAccounts++}
const signed=debit-credit;
if(kind.includes("افتتاح")){
acc.opening=signed;acc.balance=signed;
D.transactions.unshift({id:uid(),entryNo,type:"افتتاحي",entryType:"رصيد افتتاحي",date,account:accName,main:"رصيد افتتاحي",sub:"",amount:Math.abs(signed),currency:acc.currency,rate:rt(acc.currency),baseValue:Math.abs(signed)*rt(acc.currency),merchant:"",costCenter:"",tag:"",contact:"",notes,signedAmount:signed});
opened++;
}else{
acc.balance=Number(acc.balance)+signed;
if(!D.accounts.some(a=>(a.accType==="مصروف"||a.accType==="إيراد")&&a.name===kind)){D.accounts.push({id:uid(),code:nextAccCode(),name:kind,group:signed<0?"فئة مصروف":"فئة إيراد",currency:D.settings.baseCurrency,opening:0,balance:0,networth:"لا",active:"نعم",accType:signed<0?"مصروف":"إيراد"})}
D.transactions.unshift({id:uid(),entryNo,type:signed>=0?"إيراد":"مصروف",entryType:"استيراد",date,account:accName,main:kind,sub:"مستورد",amount:Math.abs(signed),currency:acc.currency,rate:rt(acc.currency),baseValue:Math.abs(signed)*rt(acc.currency),merchant:"",costCenter:"",tag:"",contact:"",notes});
created++;
}
});
audit(`استيراد قيود: ${created} حركة، ${opened} رصيد افتتاحي، ${newAccounts} حساب جديد`);
save();closeModal();go("journal");
alert(`تم الاستيراد بنجاح ✅\nحركات عادية: ${created}\nأرصدة افتتاحية: ${opened}\nحسابات جديدة تم إنشاؤها: ${newAccounts}`);
};
if(isXlsx)reader.readAsArrayBuffer(file);else reader.readAsText(file,"utf-8");
}

function nextMonthlyDueDate(day){

// ============ REPORTS (دليل شامل + تقارير بصرية) ============
// نمط الإنفاق اليومي حسب يوم الأسبوع (آخر 30 يوم) + متوسط 7 و30 يوم
function dailySpendPattern(){
const d30=new Date(today());d30.setDate(d30.getDate()-30);const from30=d30.toISOString().slice(0,10);
const d7=new Date(today());d7.setDate(d7.getDate()-7);const from7=d7.toISOString().slice(0,10);
const exp30=D.transactions.filter(t=>t.type==="مصروف"&&t.date>=from30);
const exp7=D.transactions.filter(t=>t.type==="مصروف"&&t.date>=from7);
const avg7=exp7.reduce((s,t)=>s+Number(t.baseValue||0),0)/7;
const avg30=exp30.reduce((s,t)=>s+Number(t.baseValue||0),0)/30;
const dayNames=["الأحد","الإثنين","الثلاثاء","الأربعاء","الخميس","الجمعة","السبت"];
const byDow=[0,0,0,0,0,0,0];
exp30.forEach(t=>{const dow=new Date(t.date).getDay();byDow[dow]+=Number(t.baseValue||0)});
return{byDow,dayNames,avg7,avg30};
}
function dailyPatternSVG(){
const{byDow,dayNames}=dailySpendPattern();
const maxV=Math.max(1,...byDow);
const w=560,h=170,gap=(w-30)/7;
const bars=byDow.map((v,i)=>{
const x=15+i*gap;const bh=Math.round(v/maxV*120);
return`<rect x="${x}" y="${140-bh}" width="${gap-10}" height="${bh}" fill="var(--red)" rx="2"/>
<text x="${x+(gap-10)/2}" y="158" font-size="10" fill="var(--muted)" text-anchor="middle">${dayNames[i].slice(0,4)}</text>
<text x="${x+(gap-10)/2}" y="${132-bh}" font-size="9" fill="var(--text)" text-anchor="middle">${v?mn(v):""}</text>`;
}).join("");
return`<svg viewBox="0 0 ${w} ${h}" style="width:100%;height:150px">${bars}</svg>`;
}
// ميزانية فعلي مقابل مخطط لكل فئة مصروف (المخطط = D.budgets لو موجود لها سطر بنفس اسم الفئة، وإلا فاضي)
function budgetVsActual(){
const m=thisMonth();
const exp=D.transactions.filter(t=>t.type==="مصروف"&&(t.date||"").startsWith(m));
const byCat={};exp.forEach(t=>{const k=t.main||"أخرى";byCat[k]=(byCat[k]||0)+Number(t.baseValue||0)});
const total=Object.values(byCat).reduce((s,v)=>s+v,0);
const budgetByCat={};(D.budgets||[]).forEach(b=>{if(b.category&&b.amount)budgetByCat[b.category]=Number(b.amount)});
return{byCat,total,budgetByCat};
}
function budgetPieSVG(byCat,total){
const colors=["#3b82f6","#10b981","#ef4444","#06b6d4","#f97316","#a855f7","#eab308","#94a3b8","#ec4899","#14b8a6"];
const entries=Object.entries(byCat).sort((a,b)=>b[1]-a[1]);
if(!total)return'<p class="empty">لا توجد مصروفات هذا الشهر</p>';
let angle=-90,r=80,cx=110,cy=110;
const paths=entries.map(([k,v],i)=>{
const pct=v/total;const sweep=pct*360;
const x1=cx+r*Math.cos(angle*Math.PI/180),y1=cy+r*Math.sin(angle*Math.PI/180);
angle+=sweep;
const x2=cx+r*Math.cos(angle*Math.PI/180),y2=cy+r*Math.sin(angle*Math.PI/180);
const largeArc=sweep>180?1:0;
return`<path d="M${cx},${cy} L${x1.toFixed(2)},${y1.toFixed(2)} A${r},${r} 0 ${largeArc} 1 ${x2.toFixed(2)},${y2.toFixed(2)} Z" fill="${colors[i%colors.length]}"/>`;
}).join("");
const legend=entries.map(([k,v],i)=>`<div class="split small" style="padding:3px 0"><span><span style="display:inline-block;width:10px;height:10px;background:${colors[i%colors.length]};border-radius:2px;margin-left:6px"></span>${esc(k)}</span><b>${Math.round(v/total*100)}% — ${mn(v)}</b></div>`).join("");
return`<div style="display:flex;gap:14px;align-items:center;flex-wrap:wrap"><svg viewBox="0 0 220 220" style="width:180px;height:180px;flex-shrink:0">${paths}</svg><div style="flex:1;min-width:160px">${legend}</div></div>`;
}
// صافي القيمة (أصول/مطاليب/صافي) لآخر N شهر — تراكمي حتى نهاية كل شهر بالاعتماد على حركات سجل العمليات والتحويلات
function netWorthHistory(months){
const out=[];
const d=new Date();
for(let i=months-1;i>=0;i--){
const dd=new Date(d.getFullYear(),d.getMonth()-i+1,0); // آخر يوم في الشهر المطلوب
const asOf=dd.toISOString().slice(0,10);
let assets=0,liabilities=0;
D.accounts.filter(a=>a.networth==="نعم"&&a.accType==="حساب").forEach(a=>{
const mv=accMovement("account",a.name,"2000-01-01",asOf);
const val=mv?mv.closing*rt(a.currency,asOf):Number(a.balance)*rt(a.currency);
if(val>=0)assets+=val;else liabilities+=Math.abs(val);
});
D.debts.filter(x=>x.status!=="مغلق"&&x.date<=asOf).forEach(x=>{liabilities+=(Number(x.amount)-Number(x.paid||0))*rt(x.currency||D.settings.baseCurrency,asOf)});
D.loans.filter(x=>x.status!=="مغلق"&&x.date<=asOf).forEach(x=>{assets+=(Number(x.amount)-Number(x.paid||0))*rt(x.currency||D.settings.baseCurrency,asOf)});
out.push({ym:asOf.slice(0,7),assets,liabilities,net:assets-liabilities});
}
return out;
}
function netWorthChartSVG(data){
const maxV=Math.max(1,...data.map(d=>Math.max(d.assets,d.liabilities,Math.abs(d.net))));
const w=560,h=170,gap=(w-30)/data.length;
const pathFor=(key,color)=>{
const pts=data.map((d,i)=>{const x=15+i*gap+gap/2;const y=150-Math.round(Math.abs(d[key])/maxV*130);return`${x},${y}`}).join(" ");
return`<polyline points="${pts}" fill="none" stroke="${color}" stroke-width="2"/>`+data.map((d,i)=>{const x=15+i*gap+gap/2;const y=150-Math.round(Math.abs(d[key])/maxV*130);return`<circle cx="${x}" cy="${y}" r="3" fill="${color}"/>`}).join("");
};
const labels=data.map((d,i)=>{const x=15+i*gap+gap/2;return`<text x="${x}" y="166" font-size="9" fill="var(--muted)" text-anchor="middle">${new Date(d.ym+"-01").toLocaleDateString("ar-EG",{month:"short"})}</text>`}).join("");
return`<svg viewBox="0 0 ${w} ${h}" style="width:100%;height:160px">${pathFor("assets","var(--green)")}${pathFor("liabilities","var(--red)")}${pathFor("net","var(--blue)")}${labels}</svg>`;
}
// التدفق النقدي الشهري (آخر N شهر): إجمالي وارد (إيراد + تحويلات واردة) مقابل صادر (مصروف + تحويلات صادرة)
function cashFlowHistory(months){
const out=[];const d=new Date();
for(let i=months-1;i>=0;i--){
const dd=new Date(d.getFullYear(),d.getMonth()-i,1);const ym=dd.toISOString().slice(0,7);
const inflow=D.transactions.filter(t=>t.type==="إيراد"&&(t.date||"").startsWith(ym)).reduce((s,t)=>s+Number(t.baseValue||0),0)
+D.transfers.filter(t=>(t.date||"").startsWith(ym)).reduce((s,t)=>s+Number(t.inAmount||0)*rt(t.inCurrency,t.date),0);
const outflow=D.transactions.filter(t=>t.type==="مصروف"&&(t.date||"").startsWith(ym)).reduce((s,t)=>s+Number(t.baseValue||0),0)
+D.transfers.filter(t=>(t.date||"").startsWith(ym)).reduce((s,t)=>s+(Number(t.outAmount||0)+Number(t.fee||0))*rt(t.outCurrency,t.date),0);
out.push({ym,inflow,outflow,net:inflow-outflow});
}
return out;
}
function cashFlowChartSVG(data){

<text x="${x+bw/2-2}" y="158" font-size="10" fill="var(--muted)" text-anchor="middle">${label}</text>`;
}).join("");
return`<svg viewBox="0 0 ${w} ${h}" style="width:100%;height:150px">${bars}</svg>`;
}

function startVoiceListening(){
const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
if(!SR){alert("الإدخال الصوتي غير مدعوم في هذا المتصفح. جرّب من Chrome أو Edge، أو اكتب الجملة يدوياً في المربع.");return}
if(!window.isSecureContext){
$("voiceStatus").innerText="⚠️ الإدخال الصوتي يحتاج اتصالاً آمناً (https) — لا يعمل عند فتح الملف مباشرة من الجهاز (file://) أو من رابط http عادي. لازم ترفع التطبيق على رابط https (مثل GitHub Pages) أولاً، أو استخدم الكتابة اليدوية في المربع.";
alert("⚠️ الإدخال الصوتي معطّل لأن الصفحة غير مفتوحة على اتصال آمن (https). هذا قيد من المتصفح نفسه لحماية الميكروفون، وليس عطلاً في التطبيق. استخدم الكتابة في المربع، أو ارفع التطبيق على رابط https.");
return;
}
if(_voiceListening){try{_voiceRecognition?.stop()}catch{}return}
$("voiceStatus").innerText="⏳ بنطلب صلاحية الميكروفون...";
// نطلب صلاحية الميكروفون بوضوح أولاً، لتمييز رفض الصلاحية عن أي مشكلة أخرى برسالة واضحة
navigator.mediaDevices?.getUserMedia?.({audio:true}).then(stream=>{
stream.getTracks().forEach(tr=>tr.stop()); // أوقف المعاينة فوراً، فقط كنا نتأكد من الصلاحية
launchSpeechRecognition(SR);
}).catch(err=>{
$("voiceStatus").innerText="⚠️ تعذّر الوصول للميكروفون: "+(err.message||err.name)+" — تأكد من الموافقة على صلاحية الميكروفون لهذا الموقع من إعدادات المتصفح.";
});
}
function launchSpeechRecognition(SR){
try{
_voiceRecognition=new SR();
_voiceRecognition.lang="ar-EG";
_voiceRecognition.interimResults=false;
_voiceRecognition.onstart=()=>{_voiceListening=true;const b=$("micBtn");if(b)b.innerText="⏹️ إيقاف الاستماع";$("voiceStatus").innerText="🔴 بيسمعك دلوقتي... اتكلم بجملة واضحة"};
_voiceRecognition.onerror=(e)=>{
const msgs={"not-allowed":"تم رفض صلاحية الميكروفون من إعدادات المتصفح","no-speech":"لم يُسمع أي كلام، حاول تاني وتكلم بوضوح أعلى","audio-capture":"لا يوجد ميكروفون متاح على الجهاز","network":"مشكلة في الاتصال بخدمة التعرف على الصوت (تحتاج إنترنت)"};
$("voiceStatus").innerText="⚠️ "+(msgs[e.error]||("تعذّر التعرف على الصوت: "+e.error));
};
_voiceRecognition.onend=()=>{_voiceListening=false;const b=$("micBtn");if(b)b.innerText="🎙️ ابدأ التحدث"};
_voiceRecognition.onresult=(e)=>{
const text=e.results[0][0].transcript;
$("voiceText").value=text;
$("voiceStatus").innerText="✅ تم التعرّف: "+text;
};
_voiceRecognition.start();
}catch(err){
$("voiceStatus").innerText="⚠️ تعذّر بدء الاستماع: "+err.message;
_voiceListening=false;
}
}
function runVoiceParse(){
const text=$("voiceText").value.trim();
if(!text){alert("اكتب أو اتكلم بالجملة أولاً");return}
const parsed=parseVoiceText(text);
applyParsedEntry(parsed);
}
function normalizeArabicNum(s){
const map={"٠":"0","١":"1","٢":"2","٣":"3","٤":"4","٥":"5","٦":"6","٧":"7","٨":"8","٩":"9"};
return s.replace(/[٠-٩]/g,d=>map[d]);
}
function extractAmount(text){
const t=normalizeArabicNum(text);
const m=t.match(/(\d+(?:[.,]\d+)?)\s*(ألف|الف|آلاف)/);
if(m)return Number(m[1].replace(",","."))*1000;
const m2=t.match(/(\d+(?:[.,]\d+)?)/);
return m2?Number(m2[1].replace(",",".")):null;
}
function findInText(text,names){
const found=names.filter(n=>n&&text.includes(n));
found.sort((a,b)=>b.length-a.length);
return found[0]||null;
}
function extractPerson(text){
const m=text.match(/(?:من|لـ|ل|إلى|الى)\s+([أ-يa-zA-Z]+(?:\s+[أ-يa-zA-Z]+)?)/);
return m?m[1].trim():null;
}
// يحلّل نص حر بالعربي ويحاول استخلاص نوع القيد كاملاً (مجموعة/فئة/إجراء) + المبلغ + الحساب + الفئة + الشخص
function parseVoiceText(text){
const t=text.trim();
const result={raw:t,amount:extractAmount(t),account:findInText(t,accNames()),notes:t,issues:[]};
if(!result.amount)result.issues.push("لم يتم العثور على مبلغ واضح في الجملة");

// التحويل: يحتاج كشف "من" و"إلى/ل" مع حسابين معروفين، أو كلمة "حول/تحويل"
const transferKw=/حول|تحويل|نقلت|رحّلت/.test(t);
const accMatches=accNames().filter(a=>t.includes(a));
if(transferKw&&accMatches.length>=2){
result.group="تحويل";result.fromAcc=accMatches[0];result.toAcc=accMatches[1];
return result;
}
if(transferKw&&accMatches.length===1){
result.group="تحويل";result.issues.push("تم التعرف على حساب واحد فقط للتحويل، حدّد الحساب الآخر يدوياً");
return result;
}

// تسوية حسابات أخرى — كشف بالكلمات المفتاحية (الأكثر تحديداً أولاً)
const settleRules=[
{re:/استلفت|اقترضت|سلفة من|دين علي|اخذت دين/,group:"تسوية",cat:"ديون عليّ",act:"دين عليّ (استلمت فلوس)"},
{re:/سددت دين|دفعت الدين|قفلت الدين|سداد دين/,group:"تسوية",cat:"ديون عليّ",act:"سداد دين"},
{re:/سلفت|أسلفت|سلفة لـ|اعطيت سلفة|سلفته/,group:"تسوية",cat:"سلف لي عند الناس",act:"سلفة لشخص (أعطيت فلوس)"},
{re:/استرجعت سلفت|حصلت سلفت|رجعلي|تحصيل سلفة/,group:"تسوية",cat:"سلف لي عند الناس",act:"تحصيل سلفة"},
{re:/قسط|تقسيط/,group:"تسوية",cat:"الأقساط"},
{re:/عهدة|عهد /,group:"تسوية",cat:"العهد",act:/استرج|رجع/.test(t)?"استرجاع عهدة":"عهدة جديدة"},
{re:/شقة|عقار|أرض|فيلا|محل تجاري/,group:"تسوية",cat:"العقارات"},
{re:/ذهب|دهب|قيراط/,group:"تسوية",cat:"شراء ذهب"},
{re:/ادخرت|ادخار|وفرت/,group:"تسوية",cat:"ادخار"},
{re:/استثمرت|استثمار|أسهم|صندوق استثمار/,group:"تسوية",cat:"استثمار"},
{re:/بعت/,group:"تسوية",cat:"الأصول",act:"بيع أصل"},
{re:/اشتريت|شريت/,group:null}, // عام: يحتاج تمييز أصل لاحقاً
];
for(const rule of settleRules){
if(rule.re.test(t)&&rule.group){
result.group=rule.group;result.cat=rule.cat;
if(rule.act)result.act=rule.act;
result.person=extractPerson(t);
return result;
}
}
// "اشتريت/شريت" غامضة: لو فيها اسم حساب/منتج معروف من فئات الأصول الموجودة فعلاً نعتبرها أصل، غير ذلك مصروف عادي
if(/اشتريت|شريت/.test(t)&&D.assets.some(a=>t.includes(a.category||""))){
result.group="تسوية";result.cat="الأصول";result.act="شراء أصل";
return result;
}

// الإيراد
if(/استلمت|قبضت|راتب|إيراد|دخل|ربحت|مكسب/.test(t)){
result.group="إيراد";
result.main=findInText(t,D.incCats.map(c=>c.main));
return result;
}
// المصروف (الافتراضي لو فيه فعل صرف أو مفيش أي إشارة أخرى ولكن فيه مبلغ)
result.group="مصروف";
result.main=findInText(t,D.expCats.map(c=>c.main));
result.person=null;
return result;
}
// يطبّق نتيجة التحليل على شاشة القيد الذكي (يفتحها معبّأة بالكامل ليؤكدها المستخدم أو يعدّلها قبل الحفظ — لا حفظ مباشر أبداً)
function applyParsedEntry(parsed){
openEntry({group:parsed.group,cat:parsed.cat,act:parsed.act,amount:parsed.amount,account:parsed.account,fromAcc:parsed.fromAcc,toAcc:parsed.toAcc,person:parsed.person,main:parsed.main,notes:parsed.raw});
}

{const eNo=nextEntryNo();

// ============ تكامل Google Drive (اختياري) ============
// يتطلب Client ID خاص بالمستخدم (مجاني من Google Cloud Console) — لا يوجد Client ID مشترك لأسباب أمنية وحدود الاستخدام
let gToken=null;
function gdriveSignIn(cb){
if(!D.settings.gdriveClientId){alert("أدخل Client ID أولاً من إعدادات جوجل درايف بالأسفل");return}
if(typeof google==="undefined"||!google.accounts){alert("تعذّر تحميل مكتبة Google — تأكد من الاتصال بالإنترنت، ومن أن الصفحة مفتوحة على رابط https (لا تعمل من ملف مفتوح مباشرة من الجهاز)");return}
const client=google.accounts.oauth2.initTokenClient({
client_id:D.settings.gdriveClientId,
scope:"https://www.googleapis.com/auth/drive.file",
callback:(resp)=>{
if(resp.error){alert("فشل تسجيل الدخول: "+resp.error);return}
gToken=resp.access_token;
if(typeof cb==="function")cb();
}
});
client.requestAccessToken();
}
function gdriveSignOut(){gToken=null;alert("تم تسجيل الخروج من جوجل درايف لهذه الجلسة (لن تُحذف صلاحية التطبيق من حسابك — يمكنك إلغاؤها من إعدادات حساب جوجل نفسه لو احتجت)")}
// يرفع نسخة JSON لجوجل درايف؛ ينشئ ملفاً جديداً أول مرة ثم يحدّث نفس الملف في كل مرة بعد ذلك (لا يكرر الملفات)
function gdriveUpload(silent){
gdriveSignIn(async()=>{
try{
const content=JSON.stringify(D,null,2);
const fileId=D.settings.gdriveFileId;
const meta={name:"tharwati-backup.json",mimeType:"application/json"};
let res;
if(fileId){
res=await fetch(`https://www.googleapis.com/upload/drive/v3/files/${fileId}?uploadType=media`,{method:"PATCH",headers:{Authorization:"Bearer "+gToken,"Content-Type":"application/json"},body:content});
}else{
const form=new FormData();
form.append("metadata",new Blob([JSON.stringify(meta)],{type:"application/json"}));
form.append("file",new Blob([content],{type:"application/json"}));
res=await fetch("https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart",{method:"POST",headers:{Authorization:"Bearer "+gToken},body:form});
}
if(!res.ok){const err=await res.text();throw new Error(err)}
const data=await res.json();
if(data.id)D.settings.gdriveFileId=data.id;
D.settings.lastAutoBackup=new Date().toLocaleString("ar-EG");
save2(D);
if(!silent){alert("✅ تم رفع النسخة الاحتياطية إلى جوجل درايف بنجاح");go("backup")}
}catch(err){if(!silent)alert("فشل الرفع: "+err.message)}
});
}
// يجيب آخر نسخة محفوظة من جوجل درايف ويستبدل بيانات التطبيق الحالية بها (بعد تأكيد المستخدم)
function gdriveRestore(){
if(!D.settings.gdriveFileId){alert("لا يوجد ملف نسخة احتياطية مرفوع على جوجل درايف بعد من هذا التطبيق");return}
if(!confirm("سيتم استبدال كل البيانات الحالية بالنسخة المحفوظة على جوجل درايف. هل أنت متأكد؟"))return;
gdriveSignIn(async()=>{
try{
const res=await fetch(`https://www.googleapis.com/drive/v3/files/${D.settings.gdriveFileId}?alt=media`,{headers:{Authorization:"Bearer "+gToken}});
if(!res.ok)throw new Error("تعذّر جلب الملف (HTTP "+res.status+")");
const data=await res.json();
D=data;save();

go("dashboard");

});

function toggleBackupOnClose(){D.settings.backupOnClose=!D.settings.backupOnClose;save();go("backup")}
function saveScheduledBackupTime(){
const v=$("schedTimeInp").value;
D.settings.scheduledBackupTime=v;save();
alert(v?`تم ضبط النسخ التلقائي اليومي على الساعة ${v} — يعمل فقط أثناء فتح التطبيق في المتصفح في هذا التوقيت`:"تم إلغاء النسخ المجدول");
go("backup");
}
// يفحص كل دقيقة هل حان وقت النسخة المجدولة (ولم تُنفَّذ اليوم بالفعل)، وينفّذها تلقائياً
function checkScheduledBackup(){
const t=D.settings.scheduledBackupTime;if(!t)return;
const now=new Date();
const nowHM=String(now.getHours()).padStart(2,"0")+":"+String(now.getMinutes()).padStart(2,"0");
const todayStr=today();
if(nowHM===t&&D.settings.lastScheduledBackup!==todayStr){
D.settings.lastScheduledBackup=todayStr;
runAutoBackup("النسخة المجدولة اليومية");
}
}
// ينفّذ نسخة احتياطية تلقائية: تنزيل محلي دائماً، ورفع لجوجل درايف لو كان مفعّلاً ومسجّلاً دخوله من قبل
function runAutoBackup(label){
try{dl(JSON.stringify(D,null,2),"tharwati-backup-auto.json","application/json")}catch{}
if(D.settings.gdriveAutoBackup&&D.settings.gdriveClientId&&gToken){gdriveUpload(true)}
audit("نسخة احتياطية تلقائية: "+label);save2(D);
}
setInterval(checkScheduledBackup,60000);
// نسخة احتياطية محلية عند إغلاق التطبيق/التبويب (لو مفعّلة من الإعدادات)
// نستخدم visibilitychange بالإضافة لـ beforeunload لأن المتصفحات الحديثة قد تمنع التنزيل الصامت عند beforeunload، بينما visibilitychange (عند تصغير/تبديل التبويب) أكثر موثوقية
let _lastCloseBackupDate=null;
function maybeBackupOnClose(){
if(!D?.settings?.backupOnClose)return;
const t=new Date().toISOString().slice(0,10);
if(_lastCloseBackupDate===t)return; // مرة واحدة كل يوم تكفي لمنع تنزيلات متكررة مزعجة عند كل تبديل تبويب
_lastCloseBackupDate=t;
try{dl(JSON.stringify(D,null,2),"tharwati-backup-close.json","application/json")}catch{}
}
document.addEventListener("visibilitychange",function(){if(document.visibilityState==="hidden")maybeBackupOnClose()});
window.addEventListener("beforeunload",maybeBackupOnClose);

function requireReplacementThenDelete(usageCount,itemLabel,options,onConfirm){
if(usageCount===0){

}

}

const replacement=$("replacementSelect").value;
closeModal();
if(typeof window._replacementCb==="function")window._replacementCb(replacement);
window._replacementCb=null;
}
function confirmDangerous(msg,onConfirm){
$("mTitle").innerText="⚠️ تأكيد الحذف";
$("mForm").innerHTML=`
<p>${msg}</p>
<p class="small">هذا الإجراء لا يمكن التراجع عنه. اكتب كلمة <b>حذف</b> في الخانة أدناه للتأكيد:</p>
<div class="fg"><div class="full"><input id="dangerConfirmInp" placeholder="اكتب: حذف" autocomplete="off"></div></div>
<div style="margin-top:14px;display:flex;gap:8px">
<button type="button" class="btn" style="flex:1" onclick="closeModal()">إلغاء</button>
<button type="button" class="btn red lg" style="flex:1" onclick="runDangerousConfirm()">🗑️ تأكيد الحذف</button>
</div>`;
$("mForm").onsubmit=e=>e.preventDefault();
window._dangerCb=onConfirm;
$("modal").classList.add("show");
setTimeout(()=>$("dangerConfirmInp")?.focus(),50);
}
function runDangerousConfirm(){
const v=$("dangerConfirmInp")?.value?.trim();
if(v!=="حذف"){alert('يجب كتابة كلمة "حذف" بالضبط للتأكيد');return}
closeModal();
if(typeof window._dangerCb==="function")window._dangerCb();
window._dangerCb=null;
}
// ============ سلة المحذوفات (Trash) ============
// ينقل سجلاً من أي موديول إلى السلة بدل حذفه نهائياً. onRemove (اختياري) ينفَّذ أولاً لعكس أي أثر جانبي (مثل تعديل رصيد حساب) قبل النقل للسلة.
function trashItem(module,record,label,onRemove){
if(typeof onRemove==="function")onRemove();
D.trash.unshift({id:uid(),module,label:label||"",deletedAt:new Date().toLocaleString("ar-EG"),record:structuredClone(record)});
if(D.trash.length>500)D.trash.length=500;
}
// يسترجع سجلاً من السلة لموديوله الأصلي. onRestore (اختياري) ينفَّذ بعد الإرجاع لإعادة تطبيق الأثر الجانبي (مثل تعديل رصيد حساب).
// معالجات خاصة لإعادة تطبيق الأثر الجانبي (الرصيد) عند استرجاع عمليات/تحويلات من السلة
window._trashRestoreHandlers={
transactions:(t)=>{if(t.type!=="افتتاحي"){const a=D.accounts.find(x=>x.name===t.account);if(a)a.balance=Number(a.balance)+(t.type==="إيراد"?Number(t.amount):-Number(t.amount))}},
transfers:(tr)=>{const fa=D.accounts.find(x=>x.name===tr.from);const ta=D.accounts.find(x=>x.name===tr.to);
if(fa)fa.balance=Number(fa.balance)-Number(tr.outAmount)-Number(tr.fee||0);
if(ta)ta.balance=Number(ta.balance)+Number(tr.inAmount);}
};
function restoreFromTrash(trashId){
const t=D.trash.find(x=>x.id===trashId);if(!t)return;
if(!D[t.module])D[t.module]=[];
D[t.module].push(t.record);
if(typeof window._trashRestoreHandlers?.[t.module]==="function")window._trashRestoreHandlers[t.module](t.record);
D.trash=D.trash.filter(x=>x.id!==trashId);
audit("استرجاع من السلة: "+(t.label||t.module));
save();go("trash");
}
function purgeTrashItem(trashId){
confirmDangerous("حذف نهائي — لا يمكن التراجع عن هذا أبداً. هل أنت متأكد؟",()=>{
D.trash=D.trash.filter(x=>x.id!==trashId);save();go("trash");
});
}
function purgeAllTrash(){
if(!D.trash.length)return;
confirmDangerous(`حذف كل محتويات السلة نهائياً (${D.trash.length} عنصر)؟ لا يمكن التراجع عن هذا أبداً.`,()=>{
D.trash=[];save();go("trash");
});
}
function rTrash(){
const rows=[...D.trash].sort((a,b)=>b.id-a.id);
$("content").innerHTML=`
<div class="shead"><h2>🗑️ سلة المحذوفات</h2>${rows.length?`<button class="btn red" onclick="purgeAllTrash()">🗑️ تفريغ السلة نهائياً</button>`:""}</div>
<p class="small">العناصر هنا محذوفة من شاشاتها الأصلية ولكنها لم تُحذف نهائياً بعد — يمكنك استرجاع أي منها في أي وقت.</p>
${rows.length?`<table><thead><tr><th>نوع السجل</th><th>الوصف</th><th>تاريخ الحذف</th><th></th></tr></thead><tbody>
${rows.map(t=>`<tr><td><span class="badge b">${trashModuleLabel(t.module)}</span></td><td>${esc(t.label||"")}</td><td class="small">${t.deletedAt}</td><td><button class="btn green sm" onclick="restoreFromTrash(${t.id})">↩️ استرجاع</button> <button class="btn red sm" onclick="purgeTrashItem(${t.id})">حذف نهائي</button></td></tr>`).join("")}
</tbody></table>`:'<p class="empty">السلة فاضية</p>'}`;
}
function trashModuleLabel(m){
const map={transactions:"عملية",transfers:"تحويل",custodies:"عهدة",accounts:"حساب",debts:"دين عليّ",loans:"سلفة",installments:"قسط",assets:"أصل",investments:"استثمار",gold:"ذهب",properties:"عقار",savings:"ادخار",contacts:"شخص",costCenters:"مركز تكلفة",tags:"وسم",vault:"بيانات دخول",reminders:"تذكير",checks:"شيك",warranties:"ضمان",budgets:"ميزانية",recurring:"مصروف دوري"};
return map[m]||m;
}
function exportCSV(mod){const rows=D[mod]||[];if(!rows.length)return alert("لا بيانات");const keys=Object.keys(rows[0]);const csv="\uFEFF"+[keys.join(",")].concat(rows.map(r=>keys.map(k=>`"${String(r[k]??"").replace(/"/g,'""')}"`).join(","))).join("\n");dl(csv,mod+".csv","text/csv;charset=utf-8")}
function dl(c,n,t){const a=document.createElement("a");a.href=URL.createObjectURL(new Blob([c],{type:t}));a.download=n;a.click()}

initSidebar();applyTheme();go("dashboard");
</script>
</body>
