// ============ سلة المحذوفات (Trash) ============
// ينقل سجلاً من أي موديول إلى السلة بدل حذفه نهائياً. onRemove (اختياري) ينفَّذ أولاً لعكس أي أثر جانبي (مثل تعديل رصيد حساب) قبل النقل للسلة.
function trashItem(module,record,label,onRemove){
if(typeof onRemove==="function")onRemove();
D.trash.unshift({id:uid(),module,label:label||"",deletedAt:new Date().toLocaleString("ar-EG"),record:structuredClone(record)});
if(D.trash.length>500)D.trash.length=500;
}
// يسترجع سجلاً من السلة لموديوله الأصلي. onRestore (اختياري) ينفَّذ بعد الإرجاع لإعادة تطبيق الأثر الجانبي (مثل تعديل رصيد حساب).
// معالجات خاصة لإعادة تطبيق الأثر الجانبي (الرصيد) عند استرجاع عمليات/تحويلات من السلة
window._trashRestoreHandlers={
transactions:(t)=>{if(t.type!=="افتتاحي"){const a=D.accounts.find(x=>x.name===t.account);if(a)a.balance=Number(a.balance)+(t.type==="إيراد"?Number(t.amount):-Number(t.amount))}},
transfers:(tr)=>{const fa=D.accounts.find(x=>x.name===tr.from);const ta=D.accounts.find(x=>x.name===tr.to);
if(fa)fa.balance=Number(fa.balance)-Number(tr.outAmount)-Number(tr.fee||0);
if(ta)ta.balance=Number(ta.balance)+Number(tr.inAmount);}
};
function restoreFromTrash(trashId){
const t=D.trash.find(x=>x.id===trashId);if(!t)return;
if(!D[t.module])D[t.module]=[];
D[t.module].push(t.record);
if(typeof window._trashRestoreHandlers?.[t.module]==="function")window._trashRestoreHandlers[t.module](t.record);
D.trash=D.trash.filter(x=>x.id!==trashId);
audit("استرجاع من السلة: "+(t.label||t.module));
save();go("trash");
}
function purgeTrashItem(trashId){
confirmDangerous("حذف نهائي — لا يمكن التراجع عن هذا أبداً. هل أنت متأكد؟",()=>{
D.trash=D.trash.filter(x=>x.id!==trashId);save();go("trash");
});
}
function purgeAllTrash(){
if(!D.trash.length)return;
confirmDangerous(`حذف كل محتويات السلة نهائياً (${D.trash.length} عنصر)؟ لا يمكن التراجع عن هذا أبداً.`,()=>{
D.trash=[];save();go("trash");
});
}

// ============ GLOBAL TABLE COLUMN CONTROLS v17 ============
function columnPrefsKey(table){
  const u=currentUser?.()?.username||"guest";
  const w=currentWorkspace?.()?.id||D.currentWorkspaceId||"no_ws";
  const page=cur||($("pageTitle")?.innerText)||"page";
  const headers=[...table.querySelectorAll("thead th")].map(th=>th.innerText.trim()).join("|");
  let h=0;for(let i=0;i<headers.length;i++){h=((h<<5)-h)+headers.charCodeAt(i);h|=0}
  return `${SK}_cols_${u}_${w}_${page}_${Math.abs(h)}`;
}
function getColumnPrefs(table){try{return JSON.parse(localStorage.getItem(columnPrefsKey(table))||"{}")}catch{return {}}}
function setColumnPrefs(table,prefs){localStorage.setItem(columnPrefsKey(table),JSON.stringify(prefs||{}))}
function applyColumnPrefs(table){
  const prefs=getColumnPrefs(table);
  const ths=[...table.querySelectorAll("thead th")];
  ths.forEach((th,i)=>{
    const name=th.innerText.trim()||`عمود ${i+1}`;
    const visible=prefs[name]!==false;
    table.querySelectorAll(`tr > *:nth-child(${i+1})`).forEach(cell=>{cell.style.display=visible?"":"none"});
  });
}
function openColumnPicker(tableId){
  const table=document.querySelector(`table[data-col-table-id="${tableId}"]`);if(!table)return;
  const ths=[...table.querySelectorAll("thead th")];
  const prefs=getColumnPrefs(table);
  const list=ths.map((th,i)=>{const name=th.innerText.trim()||`عمود ${i+1}`;const checked=prefs[name]!==false?"checked":"";return `<label class="col-picker-item"><input type="checkbox" data-col-name="${esc(name)}" ${checked}> <span>${esc(name)}</span></label>`}).join("");
  $("mTitle").innerText="اختيار الأعمدة الظاهرة";
  $("mForm").innerHTML=`<p class="small">اختر الأعمدة التي تريد ظهورها في هذه الشاشة. سيتم حفظ الاختيار للمستخدم الحالي وملف العمل الحالي.</p>
  <div class="col-picker-list">${list}</div>
  <div style="display:flex;gap:8px;margin-top:14px;flex-wrap:wrap">
    <button type="button" class="btn green" onclick="saveColumnPicker('${tableId}')">💾 حفظ</button>
    <button type="button" class="btn" onclick="resetColumnPicker('${tableId}')">إظهار الكل</button>
    <button type="button" class="btn red" onclick="closeModal()">إلغاء</button>
  </div>`;
  $("mForm").onsubmit=e=>e.preventDefault();
  $("modal").classList.add("show");
}
function saveColumnPicker(tableId){
  const table=document.querySelector(`table[data-col-table-id="${tableId}"]`);if(!table)return closeModal();
  const prefs={};document.querySelectorAll("#mForm [data-col-name]").forEach(ch=>{prefs[ch.getAttribute("data-col-name")]=ch.checked});
  setColumnPrefs(table,prefs);applyColumnPrefs(table);closeModal();
}
function resetColumnPicker(tableId){
  const table=document.querySelector(`table[data-col-table-id="${tableId}"]`);if(!table)return closeModal();
  localStorage.removeItem(columnPrefsKey(table));applyColumnPrefs(table);closeModal();
}
function enhanceAllTables(){
  const content=$("content");if(!content)return;
  [...content.querySelectorAll("table")].forEach((table,idx)=>{
    if(!table.querySelector("thead th"))return;
    if(!table.dataset.colTableId)table.dataset.colTableId="tbl_"+uid()+"_"+idx;
    if(!table.parentElement.classList.contains("table-wrap")){
      const wrap=document.createElement("div");wrap.className="table-wrap";
      table.parentNode.insertBefore(wrap,table);wrap.appendChild(table);
      const tools=document.createElement("div");tools.className="table-tools";
      tools.innerHTML=`<button class="btn sm" type="button" onclick="openColumnPicker('${table.dataset.colTableId}')">⚙️ الأعمدة</button>`;
      wrap.parentNode.insertBefore(tools,wrap);
    }else{
      const prev=table.parentElement.previousElementSibling;
      if(!prev||!prev.classList.contains("table-tools")){
        const tools=document.createElement("div");tools.className="table-tools";
        tools.innerHTML=`<button class="btn sm" type="button" onclick="openColumnPicker('${table.dataset.colTableId}')">⚙️ الأعمدة</button>`;
        table.parentElement.parentNode.insertBefore(tools,table.parentElement);
      }
    }
    applyColumnPrefs(table);
  });
}

  const res=[];
  (D.transactions||[]).forEach(x=>{if(hit(x,['entryNo','date','type','entryType','account','main','sub','merchant','contact','notes','amount','currency']))res.push({kind:'عملية',title:`${x.type||x.entryType||'عملية'} - ${x.main||''}`,desc:`${fmtDate(x.date)} | ${mn(x.amount,x.currency)} | ${x.account||''}`,go:`go('transactions')`});});

  (D.assets||[]).forEach(x=>{if(hit(x,['name','category','serial','place','notes']))res.push({kind:'أصل',title:x.name,desc:`${x.category||''} | ${mn(x.currentValue||x.price,x.currency)}`,go:`go('assets')`});});
  (D.warranties||[]).forEach(x=>{if(hit(x,['name','asset','provider','notes']))res.push({kind:'ضمان',title:x.name||x.asset,desc:`ينتهي: ${fmtDate(x.end||'')}`,go:`go('warranties')`});});
  (D.recurring||[]).forEach(x=>{if(hit(x,['name','category','subCategory','notes']))res.push({kind:'اشتراك',title:x.name,desc:`${mn(x.amount,x.currency)} | استحقاق: ${fmtDate(x.due||x.endDate||'')}`,go:`go('recurring')`});});

function expenseTemplateKey(t){
  const main=(t.main||'مصروفات أخرى').trim();

  return main+'||'+sub;
}
function topExpenseTemplates(limit=4){
  const map={};
  (D.transactions||[]).filter(t=>t.type==='مصروف').forEach(t=>{
    const key=expenseTemplateKey(t);
    if(!map[key])map[key]={main:t.main||'مصروفات أخرى',sub:t.sub||'',count:0,total:0,lastDate:t.date||'',lastAccount:t.account||'',lastCurrency:t.currency||D.settings.baseCurrency,lastMerchant:t.merchant||'',lastNotes:t.notes||''};
    map[key].count+=1;
    map[key].total+=Number(t.amount||0);
    if((t.date||'')>=(map[key].lastDate||'')){
      map[key].lastDate=t.date||'';
      map[key].lastAccount=t.account||map[key].lastAccount;
      map[key].lastCurrency=t.currency||map[key].lastCurrency;
      map[key].lastMerchant=t.merchant||map[key].lastMerchant;
      map[key].lastNotes=t.notes||map[key].lastNotes;
    }
  });
  return Object.values(map).sort((a,b)=>b.count-a.count || b.total-a.total).slice(0,limit);
}

// يجعل زر الرجوع في الموبايل يرجع داخل صفحات التطبيق بدل الخروج مباشرة.
let _appBackSilent=false;
let _appAllowExit=false;
let _lastRouteForBack={page:'dashboard',args:[]};
const _mobileBackGo=go;
go=function(p,...args){
  _lastRouteForBack={page:p,args:args||[]};
  _mobileBackGo(p,...args);
  if(!_appBackSilent && currentUser()){
    try{history.pushState({tharwatiApp:true,page:p,args:args||[]},'',location.pathname+location.search+'#'+encodeURIComponent(p));}catch(e){}
  }
};
function ensureInitialAppHistory(){
  if(!currentUser())return;
  const st=history.state;
  if(!st||!st.tharwatiApp){
    try{history.replaceState({tharwatiApp:true,page:cur||'dashboard',args:[]},'',location.pathname+location.search+'#'+encodeURIComponent(cur||'dashboard'));}catch(e){}
  }
}
window.addEventListener('popstate',function(e){
  const modal=$('modal');
  if(modal&&modal.classList.contains('show')){
    closeModal();
    try{history.pushState({tharwatiApp:true,page:cur||_lastRouteForBack.page,args:_lastRouteForBack.args||[]},'',location.pathname+location.search+'#'+encodeURIComponent(cur||_lastRouteForBack.page));}catch(err){}
    return;
  }
  if(e.state&&e.state.tharwatiApp){
    _appBackSilent=true;
    _mobileBackGo(e.state.page||'dashboard',...(e.state.args||[]));
    _lastRouteForBack={page:e.state.page||'dashboard',args:e.state.args||[]};
    _appBackSilent=false;
    return;
  }
  // عند أول صفحة داخل التطبيق، لا نخرج فوراً. نعرض تأكيد الخروج.
  if(currentUser()&&!_appAllowExit){
    try{history.pushState({tharwatiApp:true,page:cur||'dashboard',args:[]},'',location.pathname+location.search+'#'+encodeURIComponent(cur||'dashboard'));}catch(err){}
    if(confirm('هل تريد الخروج من التطبيق؟')){
      _appAllowExit=true;
      history.back();
    }
  }
});

/* ===== ثروتي v23: إصلاح التقويم + شاشة العمليات في الرئيسية + ألوان مخصصة ===== */
function isoLocalDate(d){
 const z=new Date(d.getFullYear(),d.getMonth(),d.getDate());
 const y=z.getFullYear();
 const m=String(z.getMonth()+1).padStart(2,'0');
 const day=String(z.getDate()).padStart(2,'0');
 return `${y}-${m}-${day}`;
}
function ymLocal(d){
 return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
}
function monthFromYM(ym){
 const [y,m]=String(ym||ymLocal(new Date())).split('-').map(Number);
 return new Date(y||new Date().getFullYear(),(m||1)-1,1);
}
function v23MonthShift(ym,delta){
 const d=monthFromYM(ym); d.setMonth(d.getMonth()+delta); return ymLocal(d);
}
function v23SameMonthSelected(ym,sel){
 if(!sel || !String(sel).startsWith(ym)) return ym+'-01';
 return sel;
}
function calendarDaySummary(events){
 const expense=events.filter(e=>e.type==='مصروف');
 const income=events.filter(e=>e.type==='إيراد');
 const transfers=events.filter(e=>e.type==='تحويل');
 const other=events.filter(e=>!['مصروف','إيراد','تحويل'].includes(e.type));
 const expAmount=expense.reduce((s,e)=>s+Math.abs(Number(e.amount||0)),0);
 const incAmount=income.reduce((s,e)=>s+Math.abs(Number(e.amount||0)),0);
 return{expense,income,transfers,other,expCount:expense.length,incCount:income.length,trCount:transfers.length,otherCount:other.length,expAmount,incAmount,net:incAmount-expAmount};
}
function calendarDayBox(x,sel){
 const s=calendarDaySummary(x.ev||[]);
 const extra=s.otherCount?`<div class="calendar-count"><span>📌 أخرى</span><span class="num">${s.otherCount}</span></div>`:'';
 const net=(s.expCount||s.incCount)?`<div class="calendar-net ${s.net>=0?'g':'r'}">${s.net>=0?'+':''}${mn(s.net)}</div>`:'';
 return `<div class="calendar-day ${x.out?'out':''} ${x.iso===today()?'today':''} ${x.iso===sel?'selected':''}" onclick="rCalendar('${x.iso.slice(0,7)}','${x.iso}')">
   <div class="calendar-num">${x.d.getDate()}</div>
   <div class="calendar-counts">
    <div class="calendar-count exp"><span>🔴 مصروف</span><span class="num">${s.expCount}</span></div>
    <div class="calendar-count inc"><span>🟢 إيراد</span><span class="num">${s.incCount}</span></div>
    ${s.trCount?`<div class="calendar-count trn"><span>🔄 تحويل</span><span class="num">${s.trCount}</span></div>`:''}
    ${extra}
   </div>${net}
  </div>`;
}

function rCalendar(month,selected){

 Object.values(byDate).forEach(list=>list.sort((a,b)=>(a.d||'').localeCompare(b.d||'')||(a.type||'').localeCompare(b.type||'')));
 const sel=v23SameMonthSelected(mStr,selected||today());
 const days=[];
 for(let i=0;i<42;i++){
   const d=new Date(start);d.setDate(start.getDate()+i);

   days.push({d,iso,out:d.getMonth()!==mm-1,ev:byDate[iso]||[]});
 }
 const monthName=first.toLocaleDateString('ar-EG',{month:'long',year:'numeric'});

 <div class="card">

   <div><b>${monthName}</b><br><span class="small">داخل كل يوم يظهر عدد حركات المصروف وعدد حركات الإيراد، مع صافي اليوم عند وجود حركة.</span></div>
   <button class="btn sm" onclick="rCalendar('${nextYm}','${nextYm}-01')">الشهر التالي ▶</button>
   <input type="month" value="${mStr}" onchange="rCalendar(this.value,this.value+'-01')">
   <input type="date" value="${sel}" onchange="rCalendar(this.value.slice(0,7),this.value)">
   <button class="btn blue sm" onclick="rCalendar('${today().slice(0,7)}','${today()}')">اليوم</button>
  </div>
  <div class="calendar-grid">${['الاثنين','الثلاثاء','الأربعاء','الخميس','الجمعة','السبت','الأحد'].map(x=>`<div class="calendar-head">${x}</div>`).join('')}
  ${days.map(x=>calendarDayBox(x,sel)).join('')}</div>
 </div>
 <div class="card" style="margin-top:14px"><div class="split"><b>حركات يوم ${fmtDate(sel)}</b><span class="badge ${daySummary.net>=0?'g':'r'}">صافي اليوم: ${mn(daySummary.net)}</span></div>
  ${calendarSummaryCards(daySummary)}

 </div>`;
}

<script id="v1_header_mode_toggle_js">
(function(){
  function ready(){return typeof D!=='undefined' && D && D.settings}
  function getMode(){return !!(ready() && (D.settings.advancedAccountingMode || D.settings.advancedMode))}
  function setMode(v){
    if(!ready())return;
    D.settings.advancedAccountingMode=!!v;
    D.settings.advancedMode=!!v;
    try{ if(typeof save==='function') save(); }catch(e){}
    try{ if(typeof initSidebar==='function') initSidebar(); }catch(e){}
    try{ if(typeof go==='function') go(typeof cur!=='undefined' && cur ? cur : 'dashboard'); }catch(e){ try{go('dashboard')}catch(_){}}
    setTimeout(updateModeToggle,30);
  }
  function updateModeToggle(){
    var box=document.getElementById('headerModeToggle');
    if(!box)return;
    var pro=getMode();
    var bSimple=box.querySelector('[data-mode="simple"]');
    var bPro=box.querySelector('[data-mode="pro"]');
    if(bSimple)bSimple.classList.toggle('active',!pro);
    if(bPro)bPro.classList.toggle('active',pro);
  }
  function mountModeToggle(){
    var actions=document.querySelector('.top .actions');
    if(!actions)return;
    document.querySelectorAll('#headerModeToggle').forEach(function(el,i){if(i>0)el.remove()});
    var box=document.getElementById('headerModeToggle');
    if(!box){
      box=document.createElement('span');
      box.id='headerModeToggle';
      box.innerHTML='<button type="button" data-mode="simple">بسيط</button><button type="button" data-mode="pro">احترافي</button>';
      var theme=document.getElementById('themeBtn');
      if(theme && theme.parentElement===actions) theme.insertAdjacentElement('afterend',box);
      else actions.insertBefore(box,actions.firstChild);
      box.querySelector('[data-mode="simple"]').addEventListener('click',function(e){e.preventDefault();setMode(false)});
      box.querySelector('[data-mode="pro"]').addEventListener('click',function(e){e.preventDefault();setMode(true)});
    }
    updateModeToggle();
  }
  var oldGo=window.go;
  if(typeof oldGo==='function'){
    window.go=function(){var r=oldGo.apply(this,arguments);setTimeout(mountModeToggle,20);return r;};
  }
  var oldSidebar=window.initSidebar;
  if(typeof oldSidebar==='function'){
    window.initSidebar=function(){var r=oldSidebar.apply(this,arguments);setTimeout(mountModeToggle,20);return r;};
  }
  window.updateModeToggle=updateModeToggle;
  window.mountModeToggle=mountModeToggle;
  document.addEventListener('DOMContentLoaded',function(){setTimeout(mountModeToggle,100);setTimeout(mountModeToggle,500);});
  setTimeout(mountModeToggle,1000);
})();

  window.rDash=function(){const mt=monthTotals();const rows=lastOps(7);let user=(D.users||[]).find(u=>u.id===D.currentUserId)||{};let ws=(D.workspaces||[]).find(w=>w.id===D.currentWorkspaceId)||{};$('content').innerHTML=`<div class="shead"><h2>👋 أهلاً ${e(user.name||user.username||'')}</h2><div><button class="btn green" onclick="openEntry()">+ إضافة عملية</button></div></div><div class="v1-hero"><div class="card"><div class="v1-muted">${e(ws.name||'ملف العمل الحالي')}</div><div class="v1-balance">${money(totalBalance())}</div><div class="v1-muted">رصيدك الحالي في الحسابات المالية</div><div class="v1-kpis" style="margin-top:12px"><div class="v1-kpi"><span>دخل الشهر</span><b class="g">${money(mt.inc)}</b></div><div class="v1-kpi"><span>مصروف الشهر</span><b class="r">${money(mt.exp)}</b></div><div class="v1-kpi"><span>المتبقي</span><b>${money(mt.net)}</b></div></div></div><div>${alertsHTML()}</div></div>${quickAddHTML()}<div class="v1-actions"><div class="v1-action" onclick="openEntryManual({group:'مصروف'})"><span>💸</span><b>مصروف</b></div><div class="v1-action" onclick="openEntryManual({group:'إيراد'})"><span>💰</span><b>إيراد</b></div><div class="v1-action" onclick="openTransferForm&&openTransferForm()"><span>🔁</span><b>تحويل</b></div><div class="v1-action" onclick="openEntryManual({group:'تسوية'})"><span>⚖️</span><b>تسوية</b></div></div><div class="v1-section-title"><h3>🗓️ اليوم</h3><button class="btn sm" onclick="go('calendar')">التقويم</button></div>${timelineHTML(todayRows())}<div class="v1-section-title"><h3>🧾 آخر العمليات</h3><button class="btn sm" onclick="go('transactions')">عرض الكل</button></div>${timelineHTML(rows)}<div class="v1-section-title"><h3>📈 التقارير السريعة</h3></div>${reportBlocksHTML()}`;try{enhanceTables()}catch(_){}};

<script id="v1_real_mode_fix_js">
(function(){
  function ready(){return typeof D!=='undefined' && D && D.settings}
  function isPro(){return !!(ready() && (D.settings.advancedAccountingMode || D.settings.advancedMode))}
  function persistMode(v){
    if(!ready())return;
    D.settings.advancedAccountingMode=!!v;
    D.settings.advancedMode=!!v;
    try{ if(typeof save==='function') save(); }catch(e){}
    try{ localStorage.setItem('tharwati_user_mode', v?'pro':'simple'); }catch(e){}
  }
  function updateHeaderMode(){
    var box=document.getElementById('headerModeToggle');
    if(!box){
      var actions=document.querySelector('.top .actions');
      if(actions){
        box=document.createElement('span'); box.id='headerModeToggle';
        box.innerHTML='<button type="button" data-mode="simple">بسيط</button><button type="button" data-mode="pro">احترافي</button>';
        var theme=document.getElementById('themeBtn');
        if(theme && theme.parentElement===actions) theme.insertAdjacentElement('afterend',box); else actions.insertBefore(box,actions.firstChild);
      }
    }
    if(!box)return;
    var pro=isPro();
    var s=box.querySelector('[data-mode="simple"]'), p=box.querySelector('[data-mode="pro"]');
    if(s)s.classList.toggle('active',!pro);
    if(p)p.classList.toggle('active',pro);
  }
  function applyModeToSidebar(){
    var pro=isPro();
    ['journal','trialbalance','ledger','rolePermissions'].forEach(function(id){
      var b=document.getElementById('n-'+id); if(b)b.style.display=pro?'':'none';

<script id="v1_biometric_login_js">
(function(){
  var BIO_KEY='tharwati_v1_biometric_users';
  function enc(s){return new TextEncoder().encode(String(s||''));}
  function toB64Url(b){return btoa(String.fromCharCode.apply(null,new Uint8Array(b))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');}
  function bytesFromB64Url(s){s=String(s||'').replace(/-/g,'+').replace(/_/g,'/');while(s.length%4)s+='=';var bin=atob(s);var arr=new Uint8Array(bin.length);for(var i=0;i<bin.length;i++)arr[i]=bin.charCodeAt(i);return arr.buffer;}
  function bioStore(){try{return JSON.parse(localStorage.getItem(BIO_KEY)||'{}')||{};}catch(e){return {};}}
  function saveBioStore(o){try{localStorage.setItem(BIO_KEY,JSON.stringify(o||{}));}catch(e){}}
  function isSecureEnough(){return !!(window.isSecureContext || location.protocol==='https:' || location.hostname==='localhost' || location.hostname==='127.0.0.1');}
  async function bioAvailable(){
    if(!window.PublicKeyCredential || !navigator.credentials)return false;
    if(!isSecureEnough())return false;
    try{
      if(PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable){return await PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable();}
      return true;
    }catch(e){return false;}
  }
  function msg(id,text,ok){var el=document.getElementById(id); if(el){el.className='small '+(ok?'g':'r'); el.innerText=text||'';} else if(text){alert(text);} }
  async function enableBiometricForCurrentUser(){
    var bioBtn=(typeof event!=='undefined'&&event&&event.target)?event.target:null; var oldTxt=bioBtn?bioBtn.innerHTML:'';
    if(bioBtn){bioBtn.disabled=true;bioBtn.innerHTML='جارٍ التحقق...';}
    var u=(typeof currentUser==='function')?currentUser():null;
    try{
    if(!u){alert('سجل الدخول أولاً ثم فعّل الدخول بالبصمة من الإعدادات.');return;}
    if(!(await bioAvailable())){alert('الدخول بالبصمة غير متاح هنا. يحتاج متصفح/تطبيق يدعم WebAuthn على اتصال آمن HTTPS، أو تطبيق Android/iOS حقيقي يدعم بصمة الجهاز.');return;}
      var challenge=crypto.getRandomValues(new Uint8Array(32));
      var userId=enc('tharwati-user-'+u.username);
      var cred=await navigator.credentials.create({publicKey:{
        challenge:challenge,
        rp:{name:'ثروتي'},
        user:{id:userId,name:u.username,displayName:u.name||u.username},
        pubKeyCredParams:[{type:'public-key',alg:-7},{type:'public-key',alg:-257}],
        authenticatorSelection:{authenticatorAttachment:'platform',userVerification:'required',residentKey:'preferred'},
        timeout:60000,
        attestation:'none'
      }});
      if(!cred){alert('لم يتم تفعيل البصمة.');return;}
      var st=bioStore();
      st[u.username]={id:toB64Url(cred.rawId),name:u.name||u.username,enabledAt:new Date().toISOString()};
      saveBioStore(st);
      if(!D.settings)D.settings={};D.settings.biometricEnabled=true; if(typeof save==='function')save();
      alert('تم تفعيل الدخول بالبصمة لهذا المستخدم على هذا الجهاز.');
    }catch(e){alert('تعذر تفعيل البصمة: '+(e&&e.message?e.message:e));}
    finally{if(bioBtn){bioBtn.disabled=false;bioBtn.innerHTML=oldTxt;}}
  }
  async function loginWithBiometric(){
    if(!(await bioAvailable())){msg('loginMsg','البصمة غير متاحة هنا. افتح التطبيق من متصفح/تطبيق يدعم WebAuthn وعلى HTTPS، أو استخدم تطبيق الموبايل لاحقاً.',false);return;}
    var st=bioStore(); var users=Object.keys(st||{});
    if(!users.length){msg('loginMsg','لم يتم تفعيل البصمة لأي مستخدم على هذا الجهاز. سجل دخولك بكلمة المرور ثم فعّلها من الإعدادات.',false);return;}
    try{
      var selected=(document.getElementById('loginUser')&&document.getElementById('loginUser').value.trim())||users[0];
      var item=st[selected]||st[users[0]]; var username=st[selected]?selected:users[0];
      var assertion=await navigator.credentials.get({publicKey:{
        challenge:crypto.getRandomValues(new Uint8Array(32)),
        allowCredentials:[{type:'public-key',id:bytesFromB64Url(item.id)}],
        userVerification:'required',
        timeout:60000
      }});
      if(!assertion){msg('loginMsg','لم يتم التحقق بالبصمة.',false);return;}
      var u=(D.users||[]).find(function(x){return x.username===username&&x.active!=='لا'});
      if(!u){msg('loginMsg','المستخدم المرتبط بالبصمة غير موجود أو غير مفعل.',false);return;}
      sessionStorage.setItem(SK+'_user',u.username);u.lastLogin=new Date().toLocaleString('ar-EG');
      if(typeof audit==='function')audit('تسجيل دخول بالبصمة: '+u.username);
      if(typeof save==='function')save(); if(typeof renderAuth==='function')renderAuth(); if(typeof go==='function')go('dashboard');
    }catch(e){msg('loginMsg','فشل التحقق بالبصمة أو تم الإلغاء.',false);}
  }

  }
  window.enableBiometricForCurrentUser=enableBiometricForCurrentUser;

  var oldSettings=window.rSettings; if(typeof oldSettings==='function')window.rSettings=function(){oldSettings.apply(this,arguments);setTimeout(addSettingsTile,50)};

<script>
(function(){
  'use strict';
  var DEFAULT_TIMEOUT_MINUTES = 10;
  var WARN_BEFORE_MS = 60 * 1000;
  var logoutTimer = null;
  var warnTimer = null;

  function securitySettings(){
    if(!window.D) return {autoLogoutMinutes: DEFAULT_TIMEOUT_MINUTES, biometricOnReturn:false};
    D.settings = D.settings || {};
    if(D.settings.autoLogoutMinutes === undefined || D.settings.autoLogoutMinutes === null || D.settings.autoLogoutMinutes === '') D.settings.autoLogoutMinutes = DEFAULT_TIMEOUT_MINUTES;
    if(D.settings.biometricOnReturn === undefined) D.settings.biometricOnReturn = false;
    if(D.settings.biometricEnabled === undefined) D.settings.biometricEnabled = false;
    return D.settings;
  }
  function timeoutMs(){
    var m = Number(securitySettings().autoLogoutMinutes);
    if(!m || m <= 0) return 0;
    return m * 60 * 1000;
  }
  function saveSafe(){ try{ if(typeof save==='function') save(); else if(typeof save2==='function' && window.D) save2(D); }catch(e){} }
  function isLoggedIn(){ try{return !!(typeof currentUser==='function' && currentUser());}catch(e){return false;} }
  function confirmLogout(){
    if(confirm('هل تريد تسجيل الخروج؟')){
      saveSafe();
      if(typeof logout==='function') logout();
    }
  }
  window.confirmLogout = confirmLogout;

  function getWarningBox(){
    var box=document.getElementById('sessionWarningBox');
    if(box) return box;
    box=document.createElement('div');
    box.id='sessionWarningBox';
    box.className='session-warning';
    box.innerHTML='<div class="row"><div><b>⏳ سيتم تسجيل الخروج خلال دقيقة بسبب عدم الاستخدام.</b><div class="small">اضغط متابعة العمل لإعادة ضبط المؤقت.</div></div><div style="display:flex;gap:8px"><button class="btn green sm" type="button" onclick="resetSessionTimer()">متابعة العمل</button><button class="btn red sm" type="button" onclick="confirmLogout()">تسجيل الخروج الآن</button></div></div>';
    document.body.appendChild(box);
    return box;
  }
  function showWarning(){ if(isLoggedIn()) getWarningBox().classList.add('show'); }
  function hideWarning(){ var box=document.getElementById('sessionWarningBox'); if(box) box.classList.remove('show'); }
  function doAutoLogout(){
    if(!isLoggedIn()) return;
    hideWarning();
    saveSafe();
    alert('تم تسجيل الخروج تلقائيًا بسبب عدم الاستخدام.');
    if(typeof logout==='function') logout();
  }
  function resetSessionTimer(){
    hideWarning();
    clearTimeout(logoutTimer); clearTimeout(warnTimer);
    var ms=timeoutMs();
    if(!ms || !isLoggedIn()) return;
    if(ms > WARN_BEFORE_MS) warnTimer=setTimeout(showWarning, ms-WARN_BEFORE_MS);
    logoutTimer=setTimeout(doAutoLogout, ms);
  }
  window.resetSessionTimer = resetSessionTimer;

  function bindActivity(){
    ['click','touchstart','keydown','scroll','mousemove','input'].forEach(function(ev){
      document.addEventListener(ev,function(){ resetSessionTimer(); },{passive:true});
    });
    document.addEventListener('visibilitychange',function(){
      if(document.visibilityState==='hidden'){
        sessionStorage.setItem((window.SK||'tharwati')+'_last_hidden',String(Date.now()));
        return;
      }
      var ms=timeoutMs();
      var hiddenAt=Number(sessionStorage.getItem((window.SK||'tharwati')+'_last_hidden')||0);
      if(ms && hiddenAt && Date.now()-hiddenAt>=ms && isLoggedIn()) doAutoLogout();
      else resetSessionTimer();
    });
  }

  function addHomeLogoutButton(){
    var content=document.getElementById('content');
    if(!content || !isLoggedIn() || window.cur!=='dashboard') return;
    if(document.getElementById('homeLogoutCard')) return;
    var card=document.createElement('div');
    card.id='homeLogoutCard';
    card.className='home-logout-card';
    card.innerHTML='<button class="btn home-logout-btn" type="button" onclick="confirmLogout()">🚪 تسجيل الخروج</button><div class="small" style="text-align:center;margin-top:8px">الخروج التلقائي يعمل بعد '+(Number(securitySettings().autoLogoutMinutes)||0)+' دقائق بدون استخدام.</div>';
    content.appendChild(card);
  }
  function addSecuritySettingsUI(){
    var content=document.getElementById('content');
    if(!content || window.cur!=='settings' || document.getElementById('securitySettingsBlock')) return;
    var s=securitySettings();
    var wrap=document.createElement('div');
    wrap.id='securitySettingsBlock';
    wrap.className='card';
    wrap.style.marginTop='14px';
    wrap.innerHTML='<div class="split"><h3>🔐 الأمان</h3><span class="small">إعدادات الدخول والحماية</span></div>'+
      '<div class="security-row"><div><b>الدخول بالبصمة / Passkey</b><div class="small">تفعيل البصمة يعتمد على دعم الجهاز والمتصفح.</div></div><button class="btn blue" type="button" onclick="enableBiometricForCurrentUser&&enableBiometricForCurrentUser()">تفعيل البصمة لهذا الجهاز</button></div>'+
      '<div class="security-row"><div><b>طلب البصمة عند الرجوع للتطبيق</b><div class="small">مناسب عند الرجوع من تطبيق آخر قبل انتهاء الجلسة.</div></div><select id="biometricOnReturnSel" onchange="D.settings.biometricOnReturn=this.value===\'1\';save();"><option value="0">لا</option><option value="1">نعم</option></select></div>'+
      '<div class="security-row"><div><b>الخروج التلقائي عند عدم الاستخدام</b><div class="small">0 = إيقاف. الافتراضي 10 دقائق.</div></div><select id="autoLogoutMinutesSel" onchange="D.settings.autoLogoutMinutes=Number(this.value);save();resetSessionTimer();"><option value="0">إيقاف</option><option value="5">5 دقائق</option><option value="10">10 دقائق</option><option value="15">15 دقيقة</option><option value="30">30 دقيقة</option><option value="60">60 دقيقة</option></select></div>';
    content.appendChild(wrap);
    var b=document.getElementById('biometricOnReturnSel'); if(b) b.value=s.biometricOnReturn?'1':'0';
    var a=document.getElementById('autoLogoutMinutesSel'); if(a) a.value=String(Number(s.autoLogoutMinutes)||0);
  }

  function patchRenderers(){
    if(typeof window.go==='function' && !window.go.__secPatched){
      var oldGo=window.go;
      window.go=function(){ var r=oldGo.apply(this,arguments); setTimeout(function(){addHomeLogoutButton();addSecuritySettingsUI();resetSessionTimer();},80); return r; };
      window.go.__secPatched=true;
    }
    if(typeof window.rDash==='function' && !window.rDash.__secPatched){
      var oldDash=window.rDash;
      window.rDash=function(){ var r=oldDash.apply(this,arguments); setTimeout(addHomeLogoutButton,60); return r; };
      window.rDash.__secPatched=true;
    }
    if(typeof window.rSettings==='function' && !window.rSettings.__secPatched){
      var oldSettings=window.rSettings;
      window.rSettings=function(){ var r=oldSettings.apply(this,arguments); setTimeout(addSecuritySettingsUI,60); return r; };
      window.rSettings.__secPatched=true;
    }
  }

  document.addEventListener('DOMContentLoaded',function(){
    securitySettings();
    bindActivity();
    patchRenderers();
    setTimeout(function(){patchRenderers();addHomeLogoutButton();addSecuritySettingsUI();resetSessionTimer();},500);
  });
})();
</script>


<script id="v1-easy-ux-patch">
(function(){

  function toast(message,type,ms){
    type=type||'info'; ms=ms||3500;
    var wrap=document.getElementById('v1ToastWrap');
    if(!wrap){wrap=document.createElement('div');wrap.id='v1ToastWrap';wrap.className='v1-toast-wrap';document.body.appendChild(wrap)}

  }

    }catch(e){}

    $('mForm').onsubmit=function(e){e.preventDefault()};
    $('modal').classList.add('show');

  };
  window.v1QuickAddAnalyze=function(){
    var txt=(document.getElementById('v1QuickAddText')||{}).value||''; txt=txt.trim();
    if(!txt){toast('اكتب العملية أولاً، مثال: دفعت 250 كهرباء من بنك','error');return;}
    try{ openEntryManual(typeof smartParseText==='function'?smartParseText(txt):simpleParseEntryText(txt)); }catch(e){ toast('تعذر تحليل النص، جرّب الإدخال اليدوي','error'); }

  window.openEntry=function(prefill){ if(prefill){return openEntryManual(prefill)} return openQuickAddDefault(); };

  var oldGo=window.go;

<script id="v1_accounts_table_restore">
(function(){

  function safe(s){ try{return esc(s)}catch(_){return String(s??'').replace(/[&<>"']/g,function(m){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]})} }
  function money(v,c){ try{return mn(v,c)}catch(_){return Number(v||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})+(c?' '+c:'')} }
  function qname(name){ return String(name||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }
  function isProtectedAccount(a){ return !!(a && (a.isSystem || ['مصروف','إيراد','أصول','مطلوبات'].includes(a.accType))); }
  function accountFilter(){ return (document.getElementById('accSearch')?.value||'').trim().toLowerCase(); }
  function accountRows(){

    const rows=accountRows();

    ].map(h=>'<th>'+h+'</th>').join('')+'</tr></thead><tbody>'+rows.map(function(a){
      const protectedAcc=isProtectedAccount(a);

        '<td><b>'+safe(a.code||'-')+'</b></td>',
        '<td>'+safe(a.name||'')+'</td>',
        '<td><span class="badge b">'+safe(a.accType||'حساب')+'</span>'+(a.isSystem?' <span class="badge y">نظام</span>':'')+'</td>',
        '<td>'+safe(a.group||'')+'</td>',
        '<td>'+safe(a.currency||'')+'</td>',
        '<td>'+money(a.opening||0,a.currency)+'</td>',
        '<td class="'+(Number(a.balance||0)>=0?'g':'r')+'"><b>'+money(a.balance||0,a.currency)+'</b></td>',
        '<td>'+safe(a.networth||'')+'</td>',
        '<td>'+safe(a.active||'')+'</td>',
        '<td><div class="action-cell"><button class="btn sm" onclick="go(\'ledger\',\'account\',\''+qname(a.name)+'\')">كشف</button> <button class="btn blue sm" onclick="editAcc('+a.id+')">تعديل</button> <button class="btn red sm" '+(protectedAcc?'title="حساب نظام لا يفضل حذفه"':'')+' onclick="delAcc('+a.id+')">حذف</button></div></td>'
      ].join('')+'</tr>';
    }).join('')+'</tbody></table></div>';
    const cards='<div class="v1-card-grid">'+(rows.map(function(a){return '<div class="v1-card-item"><div class="split"><h3>🏦 '+safe(a.name||'')+'</h3><span class="badge b">'+safe(a.accType||'حساب')+'</span></div><div class="amount '+(Number(a.balance||0)>=0?'g':'r')+'">'+money(a.balance||0,a.currency)+'</div><div class="meta">رقم '+safe(a.code||'-')+' · '+safe(a.group||'')+' · '+safe(a.currency||'')+'</div><div class="meta">افتتاحي: '+money(a.opening||0,a.currency)+' · نشط: '+safe(a.active||'')+'</div><div style="margin-top:10px;display:flex;gap:6px;flex-wrap:wrap"><button class="btn sm" onclick="go(\'ledger\',\'account\',\''+qname(a.name)+'\')">كشف</button><button class="btn blue sm" onclick="editAcc('+a.id+')">تعديل</button><button class="btn red sm" onclick="delAcc('+a.id+')">حذف</button></div></div>'}).join('')||'<p class="empty">لا توجد حسابات.</p>')+'</div>';
    $('content').innerHTML='<div class="shead"><h2>💳 الحسابات والأرصدة <span class="small">— '+safe((typeof activeWorkspaceName==='function'&&activeWorkspaceName())||'')+'</span></h2><div style="display:flex;gap:6px;flex-wrap:wrap"><button class="btn '+(mode==='table'?'green':'')+'" onclick="setAccountViewMode(\'table\')">جدول</button><button class="btn '+(mode==='cards'?'green':'')+'" onclick="setAccountViewMode(\'cards\')">كروت</button><button class="btn blue" onclick="go(\'trialbalance\')">ميزان المراجعة</button><button class="btn green" onclick="openAccForm&&openAccForm()">+ حساب</button></div></div><div class="grid g3" style="margin-bottom:12px"><div class="card kpi"><h3>إجمالي الحسابات المعروضة</h3><span class="v">'+rows.length+'</span></div><div class="card kpi"><h3>حسابات مالية</h3><span class="v">'+countReal+'</span></div><div class="card kpi"><h3>حسابات نظام</h3><span class="v">'+countSystem+'</span></div></div><div class="table-tools"><input id="accSearch" placeholder="بحث برقم الحساب / الاسم / الفئة / نوع الحساب..." value="'+safe(document.getElementById('accSearch')?.value||'')+'" oninput="rAcc()" style="max-width:420px"></div><p class="small" style="margin-bottom:10px">يمكنك عرض الحسابات كجدول كامل أو كروت. الجدول يعرض: رقم الحساب، اسم الحساب، نوع الحساب، الفئة، العملة، الرصيد الافتتاحي، الرصيد الحالي، وحالة الحساب.</p>'+(mode==='cards'?cards:table);
    try{ if(typeof enhanceTables==='function') enhanceTables(); }catch(_){}
  };
})();
</script>

<script id="v1-smart-search-light-patch">

  function safeDate(v){try{return fmtDate(v)}catch(e){return v||''}}
  function setLightDefaultOnce(){

      if(!window.D||!D.settings)return;

        D.settings.palette='azure';
        D.settings.v1LightDefaultApplied=true;
        if(typeof save2==='function')save2(D); else if(typeof save==='function')save();
      }
      if(typeof applyTheme==='function')applyTheme();
    }catch(e){console.warn('theme default patch',e)}
  }
  setLightDefaultOnce();

  window.v1SearchItems=function(){
    const rows=[];
    (D.transactions||[]).forEach(t=>rows.push({kind:'عملية',icon:t.type==='إيراد'?'⬆️':'⬇️',src:'tx',id:t.id,entryNo:t.entryNo||'',title:`${t.entryType||t.type||'عملية'} ${t.main||''} ${t.sub||''}`,sub:`قيد ${t.entryNo||'-'} · ${safeDate(t.date)} · ${t.account||''} · ${safeMn(t.amount,t.currency)}`,text:[t.entryNo,t.date,t.type,t.entryType,t.account,t.main,t.sub,t.merchant,t.contact,t.notes,t.amount,t.currency].join(' '),go:'transactions',copy:true,journal:true}));
    (D.transfers||[]).forEach(t=>rows.push({kind:'تحويل',icon:'🔁',src:'tr',id:t.id,entryNo:t.entryNo||'',title:`تحويل من ${t.from||''} إلى ${t.to||''}`,sub:`قيد ${t.entryNo||'-'} · ${safeDate(t.date)} · ${safeMn(t.outAmount,t.outCurrency)} → ${safeMn(t.inAmount,t.inCurrency)}${Number(t.fee||0)>0?' · رسوم '+safeMn(t.fee,t.outCurrency):''}`,text:[t.entryNo,t.date,t.from,t.to,t.outAmount,t.inAmount,t.outCurrency,t.inCurrency,t.notes,'تحويل'].join(' '),go:'transfers',copy:true,journal:true}));
    (D.custodies||[]).forEach(c=>rows.push({kind:'عهدة',icon:'🤝',src:'cu',id:c.id,entryNo:c.entryNo||'',title:c.name||'عهدة',sub:`قيد ${c.entryNo||'-'} · ${c.person||''} · ${safeDate(c.date)} · ${c.status||''}`,text:[c.entryNo,c.name,c.person,c.direction,c.status,c.notes].join(' '),go:'custodies',journal:true}));
    (D.accounts||[]).forEach(a=>rows.push({kind:'حساب',icon:'💳',src:'account',id:a.id,title:a.name,sub:`${a.code||''} · ${a.accType||''} · ${a.group||''} · ${safeMn(a.balance,a.currency)}`,text:[a.code,a.name,a.accType,a.group,a.currency,a.balance].join(' '),go:'accounts'}));
    (D.contacts||[]).forEach(c=>rows.push({kind:'شخص/تاجر',icon:'👤',src:'generic',mod:'contacts',id:c.id,title:c.name,sub:`${c.type||''} ${c.phone||''}`,text:JSON.stringify(c),go:'contacts'}));
    (D.assets||[]).forEach(a=>rows.push({kind:'أصل',icon:'📦',src:'generic',mod:'assets',id:a.id,title:a.name,sub:`${a.category||a.assetCat||''} · ${safeMn(a.currentValue||a.price||a.amount,a.currency)}`,text:JSON.stringify(a),go:'assets'}));
    (D.gold||[]).forEach(g=>rows.push({kind:'ذهب',icon:'🟡',src:'generic',mod:'gold',id:g.id,title:`ذهب عيار ${g.karat||''}`,sub:`${g.grams||0} جرام · تكلفة ${safeMn(g.totalBuy||g.amount,g.currency)}`,text:JSON.stringify(g),go:'gold'}));
    (D.properties||[]).forEach(p=>rows.push({kind:'عقار',icon:'🏢',src:'generic',mod:'properties',id:p.id,title:p.name||p.propName,sub:`${p.location||''} · ${safeMn(p.currentValue||p.purchasePrice||p.amount,p.currency)}`,text:JSON.stringify(p),go:'properties'}));
    (D.recurring||[]).forEach(r=>rows.push({kind:'اشتراك',icon:'🔔',src:'generic',mod:'recurring',id:r.id,title:r.name||r.title||'اشتراك',sub:`${safeMn(r.amount,r.currency)} · ${r.end?'ينتهي '+safeDate(r.end):''}`,text:JSON.stringify(r),go:'recurring'}));
    (D.warranties||[]).forEach(w=>rows.push({kind:'ضمان',icon:'🛡️',src:'generic',mod:'warranties',id:w.id,title:w.asset||w.name||'ضمان',sub:`${w.provider||''} · ${w.end?'ينتهي '+safeDate(w.end):''}`,text:JSON.stringify(w),go:'warranties'}));
    return rows;
  };
  function smartSummary(q){
    const txt=String(q||''); const tx=D.transactions||[]; const month=/الشهر|هذا الشهر/.test(txt); const todayOnly=/اليوم/.test(txt);
    const inRange=t=>todayOnly? t.date===today() : month? String(t.date||'').startsWith(thisMonth()) : true;
    if(/قيود غير متوازنة|غير متوازن/.test(txt)){
      if(typeof buildJournal==='function'&&typeof annotateJournalBalance==='function'){
        const all=annotateJournalBalance(buildJournal()).filter(r=>!r.isBalanced);
        const keys=[...new Set(all.map(r=>r.entryNo||`${r._src}:${r._id}`))];
        return {html:`عدد القيود غير المتوازنة: <b class="r">${keys.length}</b>`,special:all.slice(0,60)};
      }
      return {html:'فحص القيود غير المتوازنة غير متاح في هذه النسخة.'};
    }
    if(/مصروف|صرف|صرفت/.test(txt)){const total=tx.filter(t=>t.type==='مصروف'&&inRange(t)).reduce((s,t)=>s+Number(t.baseValue||t.amount||0),0);return {html:`إجمالي المصروفات${todayOnly?' اليوم':month?' هذا الشهر':''}: <b class="r">${safeMn(total)}</b>`};}
    if(/ايراد|إيراد|دخل|راتب/.test(txt)){const total=tx.filter(t=>t.type==='إيراد'&&inRange(t)).reduce((s,t)=>s+Number(t.baseValue||t.amount||0),0);return {html:`إجمالي الإيرادات${todayOnly?' اليوم':month?' هذا الشهر':''}: <b class="g">${safeMn(total)}</b>`};}
    if(/رصيد|حسابات/.test(txt)){const total=(D.accounts||[]).filter(a=>a.accType==='حساب'&&a.networth==='نعم').reduce((s,a)=>s+Number(a.balance||0)*(typeof rt==='function'?rt(a.currency):1),0);return {html:`إجمالي أرصدة الحسابات: <b class="g">${safeMn(total)}</b>`};}
    return {html:''};
  }
  window.v1OpenSearchResult=function(src,id,goPage,mod){
    try{
      if(src==='tx')return viewJournalEntry('tx',Number(id));
      if(src==='tr')return viewJournalEntry('tr',Number(id));
      if(src==='cu')return viewJournalEntry('cu',Number(id));
      if(src==='generic'&&typeof viewGenericRecord==='function')return viewGenericRecord(mod,Number(id));
      if(goPage)go(goPage);
    }catch(e){console.error(e); if(goPage)go(goPage);}
  };
  window.v1ViewJournalFromSearch=function(src,id){
    if(['tx','tr','cu'].includes(src)&&typeof viewJournalEntry==='function')return viewJournalEntry(src,Number(id));
    if(typeof go==='function')go('journal');
  };
  window.v1CopySearchTransaction=function(src,id){
    if(!canPerm('add')){return requirePerm('add','ليس لديك صلاحية نسخ/إضافة معاملة داخل ملف العمل الحالي');}
    if(src==='tx'){
      const t=(D.transactions||[]).find(x=>x.id===Number(id)); if(!t)return;
      const pre={group:t.type==='إيراد'?'إيراد':'مصروف',date:today(),account:t.account,amount:t.amount,currency:t.currency,main:t.main,sub:t.sub,notes:`نسخة من القيد رقم ${t.entryNo||''}${t.notes?' - '+t.notes:''}`};
      return openEntry(pre);
    }
    if(src==='tr'){
      const t=(D.transfers||[]).find(x=>x.id===Number(id)); if(!t)return;
      return openEntry({group:'تحويل',date:today(),fromAcc:t.from,toAcc:t.to,amount:t.outAmount,outAmount:t.outAmount,inAmount:t.inAmount,notes:`نسخة من التحويل رقم ${t.entryNo||''}${t.notes?' - '+t.notes:''}`});
    }
  };
  function resultCard(r){
    const actions=[];
    actions.push(`<button class="btn sm" onclick="event.stopPropagation();v1OpenSearchResult('${r.src||''}',${Number(r.id)||0},'${r.go||''}','${r.mod||''}')">👁️ عرض</button>`);
    if(r.journal)actions.push(`<button class="btn blue sm" onclick="event.stopPropagation();v1ViewJournalFromSearch('${r.src}',${Number(r.id)||0})">📔 عرض القيد</button>`);
    if(r.copy)actions.push(`<button class="btn green sm" onclick="event.stopPropagation();v1CopySearchTransaction('${r.src}',${Number(r.id)||0})">📋 نسخ المعاملة</button>`);
    return `<div class="v1-smart-card" onclick="v1OpenSearchResult('${r.src||''}',${Number(r.id)||0},'${r.go||''}','${r.mod||''}')"><span class="v1-smart-kind">${safeEsc(r.kind||'')}</span><div><b>${r.icon||''} ${safeEsc(r.title||'')}</b></div><div class="small">${safeEsc(r.sub||'')}</div><div class="v1-smart-actions">${actions.join('')}</div></div>`;
  }
  window.runSmartSearch=function(){
    const input=byId('globalSearchInput')||byId('v1HomeSmartInput')||byId('homeSmartSearch');
    const q=(input&&input.value||'').trim(); const out=byId('globalSearchResults')||byId('v1HomeSmartResults'); if(!out)return;
    if(!q){out.innerHTML='<p class="empty">اكتب كلمة أو سؤال للبحث في كل البرنامج.</p>';return;}
    const summary=smartSummary(q); const words=q.toLowerCase().split(/\s+/).filter(Boolean);
    let rows=[];
    if(summary.special){rows=summary.special.map(j=>({kind:'قيد غير متوازن',icon:'⚠️',src:j._src||'tx',id:j._id||0,entryNo:j.entryNo||'',title:`قيد ${j.entryNo||'-'} - ${j.kind||''}`,sub:`الفرق ${safeMn(Math.abs(j.balanceDiff||0),j.currency)} · ${j.account||''}`,text:JSON.stringify(j),go:'journal',journal:true}));}
    else rows=v1SearchItems().filter(r=>words.every(w=>String((r.text||'')+' '+(r.title||'')+' '+(r.sub||'')+' '+(r.kind||'')).toLowerCase().includes(w))).slice(0,60);
    out.innerHTML=(summary.html?`<div class="card" style="border-right:4px solid var(--accent);margin-bottom:10px">${summary.html}</div>`:'')+(rows.length?rows.map(resultCard).join(''):'<p class="empty">لا توجد نتائج مطابقة.</p>');
  };
  window.rSmartSearch=function(){
    byId('content').innerHTML=`<div class="shead"><h2>🔎 البحث الذكي العام</h2><button class="btn" onclick="go('dashboard')">رجوع للرئيسية</button></div>
    <div class="card"><label>ابحث في العمليات، القيود، الحسابات، الأشخاص، الأصول، الذهب، الاشتراكات والضمانات</label><div class="search-box"><input id="globalSearchInput" placeholder="مثال: أحمد / كهرباء / ذهب 21 / مصروفات هذا الشهر / قيود غير متوازنة" oninput="runSmartSearch()" onkeydown="if(event.key==='Enter')runSmartSearch()"><button class="btn green" onclick="runSmartSearch()">بحث</button></div><div class="v1-command-chips"><button class="btn sm" onclick="globalSearchInput.value='مصروفات هذا الشهر';runSmartSearch()">مصروفات الشهر</button><button class="btn sm" onclick="globalSearchInput.value='إيرادات هذا الشهر';runSmartSearch()">إيرادات الشهر</button><button class="btn sm" onclick="globalSearchInput.value='قيود غير متوازنة';runSmartSearch()">قيود غير متوازنة</button><button class="btn sm" onclick="globalSearchInput.value='ذهب';runSmartSearch()">ذهب</button></div></div><div id="globalSearchResults" style="margin-top:12px"><p class="empty">اكتب للبحث في كل البرنامج.</p></div>`;
    setTimeout(()=>byId('globalSearchInput')?.focus(),50);
  };
  function injectHomeSearch(){
    const c=byId('content'); if(!c||byId('v1TodaySmartSearch'))return;
    const box=document.createElement('div');
    box.id='v1TodaySmartSearch';
    box.className='v1-today-smart-search';
    box.innerHTML=`<div class="split"><div><b>🔎 البحث الذكي السريع</b><div class="small">موجود في شاشة اليوم/الرئيسية للوصول لأي عملية أو قيد أو حساب بسرعة.</div></div><button class="btn blue sm" onclick="go('smartSearch')">فتح البحث المتقدم</button></div><div class="v1-today-search-row"><input id="v1HomeSmartInput" placeholder="مثال: كهرباء / أحمد / قيد 15 / ذهب 21 / مصروفات هذا الشهر" onkeydown="if(event.key==='Enter')runSmartSearch()"><button class="btn green" onclick="runSmartSearch()">بحث</button></div><div id="v1HomeSmartResults"></div>`;
    c.prepend(box);
  }
  if(typeof rDash==='function'&&!window.__v1DashSearchWrapped){
    window.__v1DashSearchWrapped=true;
    const oldDash=rDash;
    window.rDash=function(){oldDash();injectHomeSearch();};
  }
  try{if(typeof initSidebar==='function')initSidebar(); if(typeof applyTheme==='function')applyTheme(); if(typeof cur!=='undefined'&&cur==='dashboard')rDash();}catch(e){console.warn('smart search patch init',e)}
})();
</script>



<script id="v1-clear-white-theme-default">
(function(){
  function applyClearWhiteDefault(){
    try{
      document.documentElement.setAttribute('data-theme','light');
      document.documentElement.setAttribute('data-palette','azure');
      if(window.D && D.settings){
        D.settings.theme='light';
        D.settings.palette='azure';
        if(typeof save2==='function')save2(D);
      }
      var b=document.getElementById('themeBtn');
      if(b)b.innerText='☀️';
    }catch(e){console.warn('clear white default theme',e);}
  }
  if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',applyClearWhiteDefault); else applyClearWhiteDefault();
  setTimeout(applyClearWhiteDefault,300);
})();
</script>
